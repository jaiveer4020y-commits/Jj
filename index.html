<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Player v5 - Debug Mode</title>
    <link rel="stylesheet" href="https://unpkg.com/artplayer/dist/artplayer.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #player { width: 100vw; height: 100vh; }
        
        #loading {
            position: fixed; inset: 0; background: #000;
            z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #poster { width: 150px; border-radius: 10px; margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        
        /* Debug Console - Remove this once working */
        #debug {
            position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.8);
            color: #0f0; font-family: monospace; font-size: 10px; padding: 10px;
            pointer-events: none; z-index: 1000; border: 1px solid #333;
        }
    </style>
</head>
<body>

<div id="loading">
    <img id="poster" src="https://via.placeholder.com/150x220?text=Loading...">
    <div id="status" style="color:white">Detecting Media...</div>
</div>

<div id="player"></div>
<div id="debug">DEBUG LOG: Initializing...</div>

<script src="https://unpkg.com/artplayer/dist/artplayer.js"></script>

<script>
const TMDB_KEY = "81f645c3d9ced06a366b0d829d844cfe";
const BASE_API = "https://hdhub.thevolecitor.qzz.io/eyJ0b3Jib3giOiJ1bnNldCIsInF1YWxpdGllcyI6IjEwODBwLDcyMHAiLCJzb3J0IjoiZGVzYyJ9/stream";

// 1. ADVANCED DETECTION
const path = window.location.pathname;
const urlParams = new URLSearchParams(window.location.search);

// Extract ID (looks for tt followed by numbers)
const idMatch = path.match(/tt\d+/);
const id = idMatch ? idMatch[0] : urlParams.get("id");

// Extract S and E from path (/tt123/1/1)
const pathParts = path.split('/').filter(p => p && p !== id);
const s = pathParts[0] || urlParams.get("s");
const e = pathParts[1] || urlParams.get("e");
const isSeries = !!(s && e);

const debug = document.getElementById("debug");
function log(msg) { debug.innerText += "\n> " + msg; console.log(msg); }

async function start() {
    log(`ID: ${id}`);
    log(`Season: ${s} | Episode: ${e}`);
    log(`Type: ${isSeries ? 'SERIES' : 'MOVIE'}`);

    if (!id) {
        log("ERROR: No ID found. URL must contain tt12345");
        document.getElementById("status").innerText = "URL Error: Missing ID";
        return;
    }

    // 2. Fetch Metadata
    fetch(`https://api.themoviedb.org/3/find/${id}?api_key=${TMDB_KEY}&external_source=imdb_id`)
        .then(r => r.json()).then(data => {
            const item = data.movie_results[0] || data.tv_results[0];
            if (item) document.getElementById("poster").src = `https://image.tmdb.org/t/p/w500${item.poster_path}`;
        });

    // 3. Construct API URL
    // Movie: BASE/id.json | Series: BASE/id/s/e.json
    const apiEndpoint = isSeries 
        ? `${BASE_API}/${id}/${s}/${e}.json` 
        : `${BASE_API}/${id}.json`;
    
    log(`Fetching API: ${apiEndpoint}`);

    try {
        const proxy = "https://api.allorigins.win/raw?url=";
        const res = await fetch(proxy + encodeURIComponent(apiEndpoint));
        
        if (!res.ok) throw "Proxy/API Error";
        
        const data = await res.json();
        log(`Found ${data.streams ? data.streams.length : 0} raw streams`);

        const filtered = (data.streams || []).map(st => {
            let url = st.url;
            if (st.name.toLowerCase().includes("pixeldrain")) {
                const pxId = url.split("/u/")[1];
                if(pxId) url = `https://pixeldrain.com/api/file/${pxId}?download`;
            }
            return { name: st.name, url: url };
        });

        if (filtered.length === 0) throw "No valid streams after filter";

        initPlayer(filtered);

    } catch (err) {
        log(`CRITICAL ERROR: ${err}`);
        document.getElementById("status").innerText = "No Streams Found";
    }
}

function initPlayer(list) {
    log(`Starting player with: ${list[0].name}`);
    
    const art = new Artplayer({
        container: "#player",
        url: list[0].url,
        autoplay: true,
        fullscreen: true,
        setting: true,
        settings: [
            {
                html: 'Source Selector',
                selector: list.map(s => ({
                    html: s.name,
                    url: s.url,
                })),
                onSelect: function(item) {
                    art.switchUrl(item.url);
                    return item.html;
                }
            }
        ]
    });

    art.on('ready', () => {
        document.getElementById("loading").style.display = "none";
        // Audio Boost
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const src = ctx.createMediaElementSource(art.video);
        const gain = ctx.createGain();
        gain.gain.value = 4;
        src.connect(gain).connect(ctx.destination);
    });
}

start();
</script>
</body>
</html>
