/* -------------------------------------------------------------------------
   DOUBLE-TAP SKIP + LEFT/RIGHT HINT
   ------------------------------------------------------------------------- */
let lastTap = 0;
videoContainer.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTap < 350) {
        const rect = video.getBoundingClientRect();
        const x = e.changedTouches[0].clientX - rect.left;
        if (x < rect.width / 2) {
            handleSkipBackward();
        } else {
            handleSkipForward();
        }
    }
    lastTap = now;
});

function showSkipHint(text, isBackward) {
    // skip hint disabled
}

function handleSkipBackward() {
    video.currentTime = Math.max(0, video.currentTime - 10);
    showSkipHint('-10 s', true);
    resetInactivityTimer();
}
function handleSkipForward() {
    video.currentTime = Math.min(video.duration, video.currentTime + 10);
    showSkipHint('+10 s', false);
    resetInactivityTimer();
}

function formatTime(totalSec) {
    if (isNaN(totalSec) || totalSec < 0) return '0:00';
    const sec = Math.floor(totalSec % 60);
    const min = Math.floor(totalSec / 60) % 60;
    const hrs = Math.floor(totalSec / 3600);
    const pad = n => n.toString().padStart(2,'0');
    return hrs ? `${hrs}:${pad(min)}:${pad(sec)}` : `${min}:${pad(sec)}`;
}
function updateBufferProgress() {
    if (!video.duration || video.duration === Infinity) return;
    const buffered = video.buffered;
    if (buffered.length === 0) { bufferIndicator.style.width = '0%'; return; }
    let furthest = 0;
    for (let i = 0; i < buffered.length; i++) furthest = Math.max(furthest, buffered.end(i));
    bufferIndicator.style.width = `${Math.min(100, (furthest / video.duration) * 100)}%`;
}
function updateProgress() {
    if (!video.duration || isSeeking) return;
    const pct = (video.currentTime / video.duration) * 100;
    progressIndicator.style.width = `${pct}%`;
    seekThumb.style.left = `calc(${pct}% - 3px)`;
    remainingTimeDisplay.textContent = `${formatTime(video.duration - video.currentTime)}`;
}

/* -------------------------------------------------------------------------
   SEEKING
   ------------------------------------------------------------------------- */
function calculateNewTime(clientX) {
    const rect = seekBar.getBoundingClientRect();
    let pos = clientX - rect.left;
    pos = Math.max(0, Math.min(pos, rect.width));
    return video.duration * (pos / rect.width);
}
function handleSeek(clientX) {
    if (!video.duration || video.duration === Infinity) return;
    const newTime = calculateNewTime(clientX);
    const pct = (newTime / video.duration) * 100;
    progressIndicator.style.width = `${pct}%`;
    seekThumb.style.left = `calc(${pct}% - 3px)`;
    remainingTimeDisplay.textContent = `-${formatTime(video.duration - newTime)}`;
}
function startSeeking(e) {
    if (!video.duration || video.duration === Infinity) return;
    isSeeking = true;
    showControls();
    seekThumb.classList.add('scale-100');

    currentMouseMoveHandler = ev => handleSeek(ev.clientX);
    currentTouchMoveHandler = ev => handleSeek(ev.touches[0].clientX);

    window.addEventListener('mousemove', currentMouseMoveHandler);
    window.addEventListener('mouseup', endSeeking);
    window.addEventListener('touchmove', currentTouchMoveHandler, {passive:true});
    window.addEventListener('touchend', endSeeking);

    handleSeek(e.touches ? e.touches[0].clientX : e.clientX);
}
function endSeeking(e) {
    if (!isSeeking) return;
    const x = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
    video.currentTime = calculateNewTime(x);
    isSeeking = false;
    seekThumb.classList.remove('scale-100');
    if (currentMouseMoveHandler) {
        window.removeEventListener('mousemove', currentMouseMoveHandler);
        currentMouseMoveHandler = null;
    }
    window.removeEventListener('mouseup', endSeeking);
    window.removeEventListener('touchend', endSeeking);
    resetInactivityTimer();
}

/* -------------------------------------------------------------------------
   FULLSCREEN
   ------------------------------------------------------------------------- */
function isMobileDevice() {
    return /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ||
           (navigator.maxTouchPoints > 1 && window.innerWidth <= 1024);
}

function lockLandscape() {
    try {
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
        }
    } catch (e) {}
}

function unlockOrientation() {
    try {
        if (screen.orientation && screen.orientation.unlock) {
            screen.orientation.unlock();
        }
    } catch (e) {}
}

function isInFullscreen() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement || video.webkitDisplayingFullscreen);
}

function toggleFullscreen() {
    // iOS Safari: only <video> supports native fullscreen via webkitEnterFullscreen
    if (video.webkitEnterFullscreen && !document.fullscreenElement && !document.webkitFullscreenElement) {
        video.webkitEnterFullscreen();
        return;
    }
    if (document.fullscreenElement || document.webkitFullscreenElement) {
        const exit = document.exitFullscreen || document.webkitExitFullscreen;
        if (exit) exit.call(document);
        if (isMobileDevice()) unlockOrientation();
    } else {
        const req = videoContainer.requestFullscreen || videoContainer.webkitRequestFullscreen;
        if (req) {
            req.call(videoContainer, { navigationUI: 'hide' })
                .then(() => { if (isMobileDevice()) lockLandscape(); })
                .catch(err => displayError('Fullscreen error: ' + err.message));
        }
    }
}
function updateFullscreenIcon() {
    const inFs = isInFullscreen();
    fullscreenEnterIcon.classList.toggle('hidden', inFs);
    fullscreenExitIcon.classList.toggle('hidden', !inFs);
    if (!inFs && isMobileDevice()) unlockOrientation();
}

function renderTracksMenu() {
    audioList.innerHTML = '';
    subtitleList.innerHTML = '';

    const getDisplayName = (track, isHls) => {
        const raw = isHls ? track.lang : track.language;
        const primary = isHls ? track.name : track.label;
        let name = raw ? getFullLanguageName(raw) : '';
        if (primary) {
            const l = primary.toLowerCase();
            if (languageCodeMap[l]) name = languageCodeMap[l];
            else if (!name || name.toLowerCase() === 'undefined' || name.toLowerCase() === raw?.toLowerCase())
                name = primary;
        }
        return name || `Track ${track.id ?? track.groupId ?? ''}`;
    };

    const audioTracks = isHlsJsMode ? hlsInstance.audioTracks : (video.audioTracks ? Array.from(video.audioTracks) : []);
    const curAudioIdx = isHlsJsMode ? hlsInstance.audioTrack : (video.audioTracks ? Array.from(video.audioTracks).findIndex(t=>t.enabled) : -1);

    if (!audioTracks.length) {
        audioList.innerHTML = '<li class="text-gray-400">No alternate audio tracks found.</li>';
    } else {
        audioTracks.forEach((track, i) => {
            const selected = isHlsJsMode ? (i === curAudioIdx) : track.enabled;
            const li = document.createElement('li');
            li.className = `track-selector cursor-pointer flex items-center gap-2 ${selected?'font-bold text-white':'text-gray-400'}`;
            const check = document.createElement('span');
            check.style.cssText = `visibility:${selected?'visible':'hidden'};flex-shrink:0;display:inline-flex;align-items:center;`;
            check.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill-rule="evenodd" clip-rule="evenodd" d="M21.2928 4.29285L22.7071 5.70706L8.70706 19.7071C8.51952 19.8946 8.26517 20 7.99995 20C7.73474 20 7.48038 19.8946 7.29285 19.7071L0.292847 12.7071L1.70706 11.2928L7.99995 17.5857L21.2928 4.29285Z" fill="white"></path></svg>`;
            const label = document.createElement('span');
            label.textContent = getDisplayName(track, isHlsJsMode);
            li.appendChild(check);
            li.appendChild(label);
            li.dataset.index = i;
            li.dataset.type  = 'audio';
            li.addEventListener('click', () => handleTrackSelection('audio', i));
            audioList.appendChild(li);
        });
    }

    // Read all subtitle/caption tracks from video.textTracks
    // They come from three sources: HLS (no data-* attr), GitHub (data-github), Wyzie (data-wyzie)
    // We display them in order: HLS → GitHub → Wyzie
    const allTextTracks = video.textTracks
        ? Array.from(video.textTracks).filter(t => t.kind === 'subtitles' || t.kind === 'captions')
        : [];

    // Map each textTrack to its source by cross-referencing <track> elements
    const trackElements = Array.from(video.querySelectorAll('track'));
    function getTrackSource(textTrack) {
        const el = trackElements.find(el =>
            el.label === textTrack.label && el.srclang === textTrack.language
        );
        if (!el) return 'hls';
        if (el.hasAttribute('data-wyzie'))  return 'wyzie';
        if (el.hasAttribute('data-github')) return 'github';
        return 'hls';
    }

    const hlsSubTracks    = (isHlsJsMode && hlsInstance) ? hlsInstance.subtitleTracks : [];

    // Sort: HLS first, GitHub second, Wyzie third
    const SOURCE_ORDER = { hls: 0, github: 1, wyzie: 2 };
    const sortedTracks = allTextTracks
        .map((t, i) => ({ track: t, originalIdx: i, source: getTrackSource(t) }))
        .sort((a, b) => SOURCE_ORDER[a.source] - SOURCE_ORDER[b.source]);

    const curSubIdx = allTextTracks.findIndex(t => t.mode === 'showing');

    // Off button
    const offLi = document.createElement('li');
    offLi.className = `track-selector cursor-pointer flex items-center gap-2 ${curSubIdx === -1 ? 'font-bold text-white' : 'text-gray-400'}`;
    const offCheck = document.createElement('span');
    offCheck.textContent = '✓';
    offCheck.style.cssText = `visibility:${curSubIdx === -1 ?'visible':'hidden'};flex-shrink:0;display:inline-flex;align-items:center;`;
    offCheck.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill-rule="evenodd" clip-rule="evenodd" d="M21.2928 4.29285L22.7071 5.70706L8.70706 19.7071C8.51952 19.8946 8.26517 20 7.99995 20C7.73474 20 7.48038 19.8946 7.29285 19.7071L0.292847 12.7071L1.70706 11.2928L7.99995 17.5857L21.2928 4.29285Z" fill="white"></path></svg>`;
    const offLabel = document.createElement('span');
    offLabel.textContent = 'Off';
    offLi.appendChild(offCheck);
    offLi.appendChild(offLabel);
    offLi.dataset.index = -1;
    offLi.dataset.type  = 'subtitle';
    offLi.addEventListener('click', () => handleTrackSelection('subtitle', -1));
    subtitleList.appendChild(offLi);

    if (!sortedTracks.length) {
        if (_wyzieLoading) {
            // Wyzie still pending and no tracks from any source yet — show spinner only
            const li = document.createElement('li');
            li.className = 'text-gray-400 flex items-center gap-2';
            li.style.cssText = 'padding: 6px 10px; font-size: 0.85em;';
            li.innerHTML = `<svg style="flex-shrink:0;animation:spin 1s linear infinite" width="13" height="13" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path opacity="0.3" d="M12 2a10 10 0 1 0 10 10" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><path d="M12 2a10 10 0 0 1 10 10" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg> Loading subtitles…`;
            subtitleList.appendChild(li);
        } else {
            // Wyzie done and still nothing — safe to say no subtitles
            subtitleList.innerHTML += '<li class="text-gray-400">No subtitle tracks found.</li>';
        }
    } else {
        let lastSource = null;
        sortedTracks.forEach(({ track, originalIdx, source }) => {
            const selected = track.mode === 'showing';

            // Source group label dividers removed
            if (source !== lastSource) {
                lastSource = source;
            }

            const hlsIdx = hlsSubTracks.findIndex(h => h.name === track.label || h.lang === track.language);
            const isHlsManaged = source === 'hls' && hlsIdx !== -1;

            // Detect if this is a Wyzie lazy (not-yet-downloaded) track
            const trackEl = Array.from(video.querySelectorAll('track[data-wyzie]'))
                .find(el => el.label === track.label && el.srclang === track.language);
            const isLazy = trackEl && trackEl.hasAttribute('data-lazy-url');

            const li = document.createElement('li');
            li.className = `track-selector cursor-pointer flex items-center gap-2 ${selected ? 'font-bold text-white' : 'text-gray-400'}`;
            const check = document.createElement('span');
            check.style.cssText = `visibility:${selected?'visible':'hidden'};flex-shrink:0;display:inline-flex;align-items:center;`;
            check.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill-rule="evenodd" clip-rule="evenodd" d="M21.2928 4.29285L22.7071 5.70706L8.70706 19.7071C8.51952 19.8946 8.26517 20 7.99995 20C7.73474 20 7.48038 19.8946 7.29285 19.7071L0.292847 12.7071L1.70706 11.2928L7.99995 17.5857L21.2928 4.29285Z" fill="white"></path></svg>`;
            const label = document.createElement('span');
            const displayName = getDisplayName(track, false);
            // [CC] = HLS or GitHub original, lazy Wyzie tracks get no suffix until loaded
            let labelText = (source === 'hls' || source === 'github') ? `${displayName} [CC]` : displayName;
            label.textContent = labelText;
            li.appendChild(check);
            li.appendChild(label);
            li.dataset.index  = originalIdx;
            li.dataset.type   = 'subtitle';
            li.dataset.hlsIdx = isHlsManaged ? hlsIdx : '';
            li.addEventListener('click', () => handleTrackSelection('subtitle', originalIdx, isHlsManaged ? hlsIdx : -2));
            subtitleList.appendChild(li);

            // Use a flag to avoid attaching duplicate listeners across re-renders
            if (!track._menuListenerAttached) {
                track._menuListenerAttached = true;
                track.addEventListener('change', renderTracksMenu);
            }
        });

        // HLS/GitHub tracks exist but Wyzie still loading — show spinner at the bottom
        const hasWyzieTracks = sortedTracks.some(t => t.source === 'wyzie');
        if (_wyzieLoading && !hasWyzieTracks) {
            const li = document.createElement('li');
            li.className = 'text-gray-400 flex items-center gap-2';
            li.style.cssText = 'padding: 6px 10px; font-size: 0.85em;';
            li.innerHTML = `<svg style="flex-shrink:0;animation:spin 1s linear infinite" width="13" height="13" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path opacity="0.3" d="M12 2a10 10 0 1 0 10 10" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><path d="M12 2a10 10 0 0 1 10 10" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg> Loading subtitles…`;
            subtitleList.appendChild(li);
        }
    }
}
function handleTrackSelection(type, idx, hlsIdx) {
    if (type === 'audio') {
        if (isHlsJsMode && hlsInstance) hlsInstance.audioTrack = idx;
        else if (video.audioTracks) {
            for (let i=0;i<video.audioTracks.length;i++) video.audioTracks[i].enabled = (i===idx);
        }
        audioSubtitleMenu.classList.add('hidden');
        renderTracksMenu();
        resetInactivityTimer();
        return;
    }

    if (type !== 'subtitle') return;

    const subs = video.textTracks
        ? Array.from(video.textTracks).filter(t => t.kind === 'subtitles' || t.kind === 'captions')
        : [];

    // Turn off — no async needed
    if (idx === -1) {
        if (isHlsJsMode && hlsInstance) hlsInstance.subtitleTrack = -1;
        subs.forEach(t => t.mode = 'disabled');
        audioSubtitleMenu.classList.add('hidden');
        renderTracksMenu();
        resetInactivityTimer();
        return;
    }

    // Check if selected track is a lazy (not-yet-loaded) Wyzie track
    const trackElements = Array.from(video.querySelectorAll('track'));
    const targetTextTrack = subs[idx];
    const matchingEl = targetTextTrack
        ? trackElements.find(el =>
            el.hasAttribute('data-wyzie') &&
            el.hasAttribute('data-lazy-url') &&
            el.label === targetTextTrack.label &&
            el.srclang === targetTextTrack.language)
        : null;

    if (matchingEl) {
        // Wyzie lazy track — disable all others first so nothing overlaps during fetch
        if (isHlsJsMode && hlsInstance) hlsInstance.subtitleTrack = -1;
        subs.forEach(t => { t.mode = 'disabled'; });

        // Show a loading indicator on the menu item (keep menu open)
        const menuItems = document.querySelectorAll('#subtitle-list .track-selector');
        menuItems.forEach((li, i) => {
            // +1 because index 0 is the "Off" item
            if (parseInt(li.dataset.index) === idx) {
                li.style.opacity = '0.5';
                li.style.pointerEvents = 'none';
                const lbl = li.querySelector('span:last-child');
                if (lbl) lbl.textContent += ' (loading…)';
            }
        });

        // Fetch the SRT file now that the user has actually asked for it
        fetchAndActivateWyzieTrack(matchingEl).then(ok => {
            if (ok) {
                // Now that the <track> has a real src, activate its textTrack
                const freshSubs = Array.from(video.textTracks)
                    .filter(t => t.kind === 'subtitles' || t.kind === 'captions');
                freshSubs.forEach((t, i) => { t.mode = (i === idx) ? 'showing' : 'disabled'; });
                // Safety check
                const showing = freshSubs.filter(t => t.mode === 'showing');
                if (showing.length > 1) showing.slice(1).forEach(t => { t.mode = 'disabled'; });
            }
            audioSubtitleMenu.classList.add('hidden');
            renderTracksMenu();
            resetInactivityTimer();
        });
        return; // exit — async path handles the rest
    }

    // HLS-managed track
    if (hlsIdx !== undefined && hlsIdx >= 0) {
        if (isHlsJsMode && hlsInstance) hlsInstance.subtitleTrack = hlsIdx;
        subs.forEach((t, i) => { t.mode = (i === idx) ? 'showing' : 'disabled'; });
    } else {
        // GitHub or already-loaded Wyzie track
        if (isHlsJsMode && hlsInstance) hlsInstance.subtitleTrack = -1;
        subs.forEach((t, i) => { t.mode = (i === idx) ? 'showing' : 'disabled'; });
    }

    // Safety: ensure no two tracks are simultaneously showing
    const showingTracks = subs.filter(t => t.mode === 'showing');
    if (showingTracks.length > 1) showingTracks.slice(1).forEach(t => { t.mode = 'disabled'; });

    audioSubtitleMenu.classList.add('hidden');
    renderTracksMenu();
    resetInactivityTimer();
}

   PLAYBACK‑SPEED LOGIC
   ------------------------------------------------------------------------- */
function renderSpeedMenu() {
    speedList.innerHTML = '';
    SPEED_OPTIONS.forEach(opt => {
        const li = document.createElement('li');
        li.className = `cursor-pointer hover:opacity-80 p-1 rounded transition text-sm ${video.playbackRate===opt.value?'font-bold text-white':'text-gray-400'}`;
        li.textContent = opt.label;
        li.dataset.speed = opt.value;
        li.addEventListener('click', () => setPlaybackSpeed(opt.value));
        speedList.appendChild(li);
    });
}
function setPlaybackSpeed(rate) {
    video.playbackRate = rate;
    renderSpeedMenu();
    speedMenu.classList.add('hidden');
    resetInactivityTimer();
}
function toggleSpeedMenu() {
    const hidden = speedMenu.classList.contains('hidden');
    if (hidden) {
        renderSpeedMenu();
        speedMenu.classList.remove('hidden');
        clearTimeout(inactivityTimer);
        showControls();
    } else {
        speedMenu.classList.add('hidden');
        resetInactivityTimer();
    }
}
function handleSpeedKeyboard(e) {
    if (e.key === ',' || e.key === '<') {
        e.preventDefault();
        const cur = SPEED_OPTIONS.findIndex(o => o.value === video.playbackRate);
        if (cur > 0) setPlaybackSpeed(SPEED_OPTIONS[cur-1].value);
    } else if (e.key === '.' || e.key === '>') {
        e.preventDefault();
        const cur = SPEED_OPTIONS.findIndex(o => o.value === video.playbackRate);
        if (cur < SPEED_OPTIONS.length-1) setPlaybackSpeed(SPEED_OPTIONS[cur+1].value);
    }
}
speedButton.addEventListener('click', e => { e.stopPropagation(); toggleSpeedMenu(); });
document.addEventListener('click', handleDocumentClick);
document.addEventListener('keydown', handleSpeedKeyboard);

/* -------------------------------------------------------------------------
   RESUME / LOCAL STORAGE
   ------------------------------------------------------------------------- */
function generateStorageKey(url) { return `video_progress:${url}`; }
function saveVideoProgress() {
    if (!video.duration || isNaN(video.duration) || video.duration === Infinity) return;
    if (video.currentTime < 1 || video.currentTime > video.duration - 5) return;
    try {
        const data = { currentTime: video.currentTime, duration: video.duration, timestamp: Date.now(), url: resolvedUrl };
        localStorage.setItem(videoStorageKey, JSON.stringify(data));
    } catch (e) { console.error('save progress error', e); }
}
function restoreVideoProgress() {
    if (hasRestoredPosition) return;
    if (!video.duration || isNaN(video.duration) || video.duration === Infinity) return;
    try {
        const raw = localStorage.getItem(videoStorageKey);
        if (!raw) return;
        const data = JSON.parse(raw);
        if (data.url !== resolvedUrl || data.currentTime <= 1 || data.currentTime >= video.duration - 5) return;
        hasRestoredPosition = true;
        const seek = () => {
            video.currentTime = data.currentTime;
        };
        if (video.readyState >= 2) seek();
        else video.addEventListener('canplay', seek, {once:true});
    } catch (e) { hasRestoredPosition = true; }
}

function clearVideoProgress() {
    try { localStorage.removeItem(videoStorageKey); } catch (e) { console.error(e); }
}
function startProgressSaving() {
    saveProgressInterval = setInterval(saveVideoProgress, 5000);
    video.addEventListener('pause', saveVideoProgress);
    video.addEventListener('seeking', saveVideoProgress);
    video.addEventListener('ended', clearVideoProgress);
    window.addEventListener('beforeunload', saveVideoProgress);
}
function stopProgressSaving() {
    clearInterval(saveProgressInterval);
    saveProgressInterval = null;
    video.removeEventListener('pause', saveVideoProgress);
    video.removeEventListener('seeking', saveVideoProgress);
    video.removeEventListener('ended', clearVideoProgress);
    window.removeEventListener('beforeunload', saveVideoProgress);
}
function getMediaInfoFromUrl() {
    const path = window.location.pathname;

    const tvMatch = path.match(/\/tv\/(\d+)\/S(\d+)\/E(\d+)/i);
    if (tvMatch) {
        return {
            mediaType:     'tv',
            contentId:     tvMatch[1],
            seasonNumber:  Number(tvMatch[2]),
            episodeNumber: Number(tvMatch[3]),
        };
    }

    const movieMatch = path.match(/\/movie\/(\d+)/i);
    if (movieMatch) {
        return {
            mediaType: 'movie',
            contentId: movieMatch[1],
        };
    }

    return { mediaType: null, contentId: null };
}

function postTimeUpdateToParent() {
    if (window.parent !== window) {
        window.parent.postMessage({
            event: 'videoTimeUpdate',
            currentTime: video.currentTime,
            duration: video.duration,
            paused: video.paused,
            ...getMediaInfoFromUrl(),
        }, '*');
    }
}

   ONE-TIME UI CONTROL BINDINGS  –  called once on page load only

function setupUIControls() {
    const container = videoContainer;
    ['mousemove','mousedown','touchstart','touchend'].forEach(ev => container.addEventListener(ev, resetInactivityTimer, ev.startsWith('touch') ? {passive:true} : false));

        const mobile = window.innerWidth <= 1000;

            const anyHidden = els.some(el => el.style.display === 'none');

        } else {

        }
    });

    customPlayButton.addEventListener('click', toggleVideoPlayPause);
    centerPlayPauseButton.addEventListener('click', toggleVideoPlayPause);
    fullscreenButton.addEventListener('click', toggleFullscreen);
    skipBackwardButton.addEventListener('click', handleSkipBackward);
    skipForwardButton.addEventListener('click', handleSkipForward);
    mobileSkipBackwardButton.addEventListener('click', handleSkipBackward);
    mobileSkipForwardButton.addEventListener('click', handleSkipForward);
    muteButton.addEventListener('click', toggleMute);
    audioSubtitleToggle.addEventListener('click', e => { e.stopPropagation(); toggleAudioSubtitleMenu(); });

    seekBar.addEventListener('mousedown', startSeeking);
    seekBar.addEventListener('touchstart', startSeeking, {passive:true});

    volumeControlWrapper.addEventListener('mouseenter', () => volumeSliderContainer.classList.remove('hidden'));
    volumeControlWrapper.addEventListener('mouseleave', () => setTimeout(() => { if (!isVolumeAdjusting) volumeSliderContainer.classList.add('hidden'); }, 300));

    document.addEventListener('fullscreenchange', updateFullscreenIcon);
    document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);
    video.addEventListener('webkitbeginfullscreen', updateFullscreenIcon);
    video.addEventListener('webkitendfullscreen', updateFullscreenIcon);

    video.addEventListener('timeupdate', () => { updateProgress(); postTimeUpdateToParent(); });
    video.addEventListener('progress', updateBufferProgress);
    video.addEventListener('loadedmetadata', () => {
        updateProgress(); updateBufferProgress();
        remainingTimeDisplay.textContent = `-${formatTime(video.duration)}`;
    });
    video.addEventListener('volumechange', updateVolumeSlider);
    video.addEventListener('waiting', showLoader);
    video.addEventListener('playing', hideLoader);
    video.addEventListener('canplay', hideLoader);
    video.addEventListener('pause', () => {
        showControls();
        updateBottomPlayPauseIcon(true);
        updateCenterPlayPauseIcon(true);
        clearTimeout(inactivityTimer);
    });
    video.addEventListener('play', () => {
        updateBottomPlayPauseIcon(false);
        updateCenterPlayPauseIcon(false);
        resetInactivityTimer();
    });
    video.addEventListener('ended', () => {
        showControls();
        updateBottomPlayPauseIcon(true);
        updateCenterPlayPauseIcon(true);
        hideLoader();
    });

    // Next Episode button — only shown on TV routes, re-evaluated on each episode change
    const nextEpisodeButton = document.getElementById('next-episode-button');
    nextEpisodeButton.addEventListener('click', () => {
        const tvMatch = window.location.pathname.match(/\/tv\/(\d+)\/S(\d+)\/E(\d+)/i);
        if (!tvMatch) return;
        playEpisode(tvMatch[1], Number(tvMatch[2]), Number(tvMatch[3]) + 1);
    });

    updateNextEpisodeButtonVisibility();
}

/* -------------------------------------------------------------------------
   NEXT EPISODE BUTTON VISIBILITY  –  called on each episode change
   Hides the button if the next episode key is absent from the season JSON.
   ------------------------------------------------------------------------- */
async function updateNextEpisodeButtonVisibility() {
    const nextEpisodeButton = document.getElementById('next-episode-button');
    const tvMatch = window.location.pathname.match(/\/tv\/(\d+)\/S(\d+)\/E(\d+)/i);

    if (!tvMatch) {
        nextEpisodeButton.classList.add('hidden');
        return;
    }

    // Optimistically hide while we check, so the button never briefly shows wrong
    nextEpisodeButton.classList.add('hidden');

    const seriesId     = tvMatch[1];
    const seasonNumber = Number(tvMatch[2]);
    const nextEpisode  = Number(tvMatch[3]) + 1;

    try {
        const githubJsonUrl =
            `https://raw.githubusercontent.com/Watchout2025/api/refs/heads/main/hls/tv/${seriesId}/S${seasonNumber}.json`;
        const res  = await fetch(githubJsonUrl, { cache: 'no-store' });
        if (!res.ok) return; // Can't confirm next episode — keep hidden

        const data = await res.json();
        if (data[nextEpisode]) {
            nextEpisodeButton.classList.remove('hidden');
        }
        // Otherwise stays hidden — next episode doesn't exist in JSON
    } catch (e) {
        // Network/parse error — keep button hidden to avoid dead clicks
        console.warn('updateNextEpisodeButtonVisibility failed:', e.message);
    }
}

/* -------------------------------------------------------------------------
   PER-PLAYBACK SETUP  –  called each time a new stream starts
   ------------------------------------------------------------------------- */
function setupInactivityDetection() {
    if (!isHlsJsMode && video.audioTracks) video.audioTracks.addEventListener('change', renderTracksMenu);

    lastKnownVolume = video.volume > 0 ? video.volume : 0.5;
    updateProgress(); updateBufferProgress(); updateVolumeSlider(); updateFullscreenIcon();
    updateNextEpisodeButtonVisibility();

    if (video.paused || video.ended) {
        showControls();
        updateBottomPlayPauseIcon(true);
        updateCenterPlayPauseIcon(true);
    } else {
        updateBottomPlayPauseIcon(false);
        updateCenterPlayPauseIcon(false);
        resetInactivityTimer();
    }
}

/* -------------------------------------------------------------------------
   VOLUME SLIDER
   ------------------------------------------------------------------------- */
function calculateNewVolume(clientY) {
    const rect = volumeSliderTrack.getBoundingClientRect();
    let dist = rect.bottom - clientY;
    dist = Math.max(0, Math.min(dist, rect.height));
    return dist / rect.height;
}
function handleVolumeAdjust(e) {
    e.preventDefault();
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    const vol = calculateNewVolume(y);
    video.volume = vol;
    if (vol > 0) { video.muted = false; lastKnownVolume = vol; }
    else video.muted = true;
    updateVolumeSlider();
}
function startVolumeAdjusting(e) {
    isVolumeAdjusting = true;
    e.preventDefault();
    window.addEventListener('mousemove', handleVolumeAdjust);
    window.addEventListener('mouseup', endVolumeAdjusting);
    window.addEventListener('touchmove', handleVolumeAdjust);
    window.addEventListener('touchend', endVolumeAdjusting);
    handleVolumeAdjust(e);
}
function endVolumeAdjusting() {
    if (!isVolumeAdjusting) return;
    isVolumeAdjusting = false;
    window.removeEventListener('mousemove', handleVolumeAdjust);
    window.removeEventListener('mouseup', endVolumeAdjusting);
    window.removeEventListener('touchmove', handleVolumeAdjust);
    window.removeEventListener('touchend', endVolumeAdjusting);
    resetInactivityTimer();
}
volumeSliderTrack.addEventListener('mousedown', startVolumeAdjusting);
volumeSliderTrack.addEventListener('touchstart', startVolumeAdjusting, {passive:true});

/* -------------------------------------------------------------------------
   KEYBOARD SHORTCUTS
   ------------------------------------------------------------------------- */
function handleKeyboardShortcuts(e) {
    if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;

    const prevent = ['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'];
    if (prevent.includes(e.code)) e.preventDefault();

    switch (e.code) {
        case 'Space':
        case 'KeyK': toggleVideoPlayPause(); break;
        case 'ArrowLeft': video.currentTime = Math.max(0, video.currentTime-5); resetInactivityTimer(); break;
        case 'ArrowRight': video.currentTime = Math.min(video.duration, video.currentTime+5); resetInactivityTimer(); break;
        case 'KeyJ': handleSkipBackward(); break;
        case 'KeyL': handleSkipForward(); break;
        case 'ArrowUp':
            e.preventDefault();
            video.volume = Math.min(1, video.volume+0.05);
            video.muted = false; lastKnownVolume = video.volume;
            updateVolumeSlider(); resetInactivityTimer(); break;
        case 'ArrowDown':
            e.preventDefault();
            video.volume = Math.max(0, video.volume-0.05);
            if (video.volume===0) video.muted = true;
            updateVolumeSlider(); resetInactivityTimer(); break;
        case 'KeyM': toggleMute(); break;
        case 'KeyF': toggleFullscreen(); break;
        case 'KeyC':
            if (isHlsJsMode && hlsInstance) {
                const cur = hlsInstance.subtitleTrack;
                const nextIdx = cur === -1 ? 0 : -1;
                hlsInstance.subtitleTrack = nextIdx;
                // Sync native textTracks so cues actually render
                const subs = Array.from(video.textTracks).filter(t=>t.kind==='subtitles'||t.kind==='captions');
                subs.forEach((t,i) => { t.mode = (nextIdx >= 0 && i === nextIdx) ? 'showing' : 'disabled'; });
            } else if (video.textTracks) {
                const subs = Array.from(video.textTracks).filter(t=>t.kind==='subtitles'||t.kind==='captions');
                const showing = subs.some(t=>t.mode==='showing');
                subs.forEach((t,i)=> t.mode = showing ? 'disabled' : (i===0?'showing':'disabled'));
            }
            renderTracksMenu(); resetInactivityTimer(); break;
        default:
            if (e.code.startsWith('Digit')) {
                const d = parseInt(e.code.replace('Digit',''));
                video.currentTime = (video.duration * d) / 10;
                resetInactivityTimer();
            } else if (e.code === 'Home') { video.currentTime = 0; resetInactivityTimer(); }
            else if (e.code === 'End') { video.currentTime = video.duration; resetInactivityTimer(); }
            else if (e.code === 'Comma' && video.paused) { video.currentTime = Math.max(0, video.currentTime-1/30); resetInactivityTimer(); }
            else if (e.code === 'Period' && video.paused) { video.currentTime = Math.min(video.duration, video.currentTime+1/30); resetInactivityTimer(); }
    }
}
document.addEventListener('keydown', handleKeyboardShortcuts);

/* -------------------------------------------------------------------------
   HLS / DIRECT VIDEO INITIALISATION
   ------------------------------------------------------------------------- */
function isDirectVideoUrl(url) {
    try {
        const path = new URL(url).pathname.toLowerCase();
        return /\.(mp4|webm|ogg|ogv|mov|mkv|avi|flv|m4v)(\?|$)/.test(path);
    } catch (e) {
        return /\.(mp4|webm|ogg|ogv|mov|mkv|avi|flv|m4v)(\?|$)/.test(url.toLowerCase());
    }
}

function initHlsPlayer(url) {
    // Flush progress for the current episode before switching.
    // Must happen before resolvedUrl / videoStorageKey are overwritten.
    saveVideoProgress();
    if (saveProgressInterval) {
        clearInterval(saveProgressInterval);
        saveProgressInterval = null;
    }

    // Tear down any existing HLS instance cleanly before starting a new one.
    // This prevents the old instance from firing fatal error events mid-swap.
    stopProgressSaving();
    hasRestoredPosition = false;
    if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
    }
    // Remove injected subtitle tracks from previous episode
    Array.from(video.querySelectorAll('track[data-github], track[data-wyzie]')).forEach(t => t.remove());
    errorMessageDiv.classList.add('hidden');

    // Reset per-episode progress state so the new episode starts fresh.
    hasRestoredPosition = false;

    resolvedUrl     = url;
    videoStorageKey = generateStorageKey(url);

    /* ---- Direct video file (MP4, WebM, etc.) ---- */
    if (isDirectVideoUrl(url)) {
        isHlsJsMode = false;
        showLoader();
        video.src = url;
        video.addEventListener('loadedmetadata', () => {
            renderTracksMenu(); hideLoader(); setupInactivityDetection();
            restoreVideoProgress(); startProgressSaving();
            video.play().catch(() => {});
        }, {once:true});
        video.addEventListener('error', () => {
            if (video.currentTime > 0 || video.readyState >= 2) return;
            displayError('Failed to load video: ' + (video.error ? video.error.message : 'unknown error'));
            hideLoader();
        }, {once:true});
        return;
    }

    /* ---- HLS stream (.m3u8) ---- */
    if (Hls.isSupported()) {
        isHlsJsMode = true;
        showLoader();
        const h = new Hls({
            renderTextTracksNatively: true,
            subtitleDisplay: true,
        });
        hlsInstance = h;

        h.on(Hls.Events.MEDIA_ATTACHED, () => h.loadSource(url));
        h.on(Hls.Events.MANIFEST_PARSED, renderTracksMenu);
        h.on(Hls.Events.AUDIO_TRACK_SWITCHED, renderTracksMenu);
        h.on(Hls.Events.SUBTITLE_TRACK_SWITCHED, renderTracksMenu);
        h.on(Hls.Events.ERROR, (ev, data) => {
            if (data.fatal) {
                displayError('Fatal HLS error');
                h.destroy();
                hideLoader();
            }
        });

        /* Fix HLS cue position — move from browser-default bottom to line:85%
           (same position used by GitHub/Wyzie subtitles via srtToVtt)            */
        function fixHlsCueLine(cue) {
            if (!(cue instanceof VTTCue)) return;
            cue.line        = 85;
            cue.snapToLines = false;
            cue.position    = 50;
            cue.align       = 'center';
        }
        function patchTrackCues(track) {
            if (track.cues) Array.from(track.cues).forEach(fixHlsCueLine);
            track.addEventListener('cuechange', () => {
                if (track.cues) Array.from(track.cues).forEach(fixHlsCueLine);
            });
        }
        video.textTracks.addEventListener('addtrack', e => {
            const t = e.track;
            if (t.kind === 'subtitles' || t.kind === 'captions') {
                // Only patch HLS-native tracks, not our injected GitHub/Wyzie ones
                const el = Array.from(video.querySelectorAll('track'))
                    .find(el => el.label === t.label && el.srclang === t.language);
                if (!el || (!el.hasAttribute('data-github') && !el.hasAttribute('data-wyzie'))) {
                    patchTrackCues(t);
                }
            }
        });

        h.attachMedia(video);

        video.addEventListener('loadedmetadata', () => restoreVideoProgress(), {once:true});
        video.addEventListener('canplay', () => { hideLoader(); setupInactivityDetection(); startProgressSaving(); video.play().catch(() => {}); }, {once:true});
    }
    else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        isHlsJsMode = false;
        showLoader();
        video.src = url;
        video.addEventListener('loadedmetadata', () => {
            renderTracksMenu(); hideLoader(); setupInactivityDetection();
            restoreVideoProgress(); startProgressSaving();
            video.play().catch(() => {});
        }, {once:true});
        video.addEventListener('error', () => {
            if (video.currentTime > 0 && !video.paused) return;
            displayError('Failed to load stream: ' + (video.error ? video.error.message : 'unknown error'));
            hideLoader();
        }, {once:true});
    }
    else {
        displayError('Browser does not support HLS');
        hideLoader();
    }
}

/* -------------------------------------------------------------------------
   PLAY MOVIE  –  /movie/{tmdbId}
   ------------------------------------------------------------------------- */
async function playMovie(movieId) {
    _revokeAllSubtitleBlobs();
    showLoader();

    const githubUrl =
        `https://raw.githubusercontent.com/Watchout2025/api/refs/heads/main/hls/movie/${movieId}`;

    try {
        const res = await fetch(githubUrl, { cache: 'no-store' });
        if (!res.ok) {
            displayError(`Could not load movie data (HTTP ${res.status}).`);
            hideLoader();
            return;
        }

        const cleanUrl = (await res.text()).trim();

        if (cleanUrl && (cleanUrl.includes('.m3u8') || cleanUrl.includes('http'))) {
            initHlsPlayer(cleanUrl);
            loadSubtitlesFromGithub('movie', movieId);
            loadSubtitlesFromWyzie('movie', movieId);
            fetchAndSetTitle('movie', movieId);
        } else {
            displayError(`Invalid stream URL received for movie ${movieId}.`);
            hideLoader();
        }
    } catch (err) {
        displayError(`Failed to fetch movie data: ${err.message}`);
        hideLoader();
    }
}

/* -------------------------------------------------------------------------
   PLAY EPISODE  –  /tv/{tmdbId}/S{season}/E{episode}
   ------------------------------------------------------------------------- */
async function playEpisode(seriesId, seasonNumber, episodeNumber) {
    _revokeAllSubtitleBlobs();
    const expectedPath = `/tv/${seriesId}/S${seasonNumber}/E${episodeNumber}`;
    if (window.location.pathname !== expectedPath) {
        history.replaceState(null, '', expectedPath);
    }

    showLoader();

    const githubJsonUrl =
        `https://raw.githubusercontent.com/Watchout2025/api/refs/heads/main/hls/tv/${seriesId}/S${seasonNumber}.json`;

    try {
        const res = await fetch(githubJsonUrl, { cache: 'no-store' });
        if (!res.ok) {
            displayError(`Could not load season data (HTTP ${res.status}).`);
            hideLoader();
            return;
        }

        const data   = await res.json();
        const fileId = data[episodeNumber];

        if (fileId) {
            initHlsPlayer(fileId);
            loadSubtitlesFromGithub('tv', seriesId, seasonNumber, episodeNumber);
            loadSubtitlesFromWyzie('tv', seriesId, seasonNumber, episodeNumber);
            fetchAndSetTitle('tv', seriesId, seasonNumber, episodeNumber);
        } else {
            displayError(`Episode ${episodeNumber} not found in season data.`);
            hideLoader();
        }
    } catch (err) {
        displayError(`Failed to fetch episode data: ${err.message}`);
        hideLoader();
    }
}

/* -------------------------------------------------------------------------
   START  –  Route dispatcher
             Movie:    /movie/{tmdbId}
             TV:       /tv/{tmdbId}/S{season}/E{episode}
             Fallback: ?url=  or hardcoded default
   ------------------------------------------------------------------------- */
async function resolveAndPlay() {
    const path = window.location.pathname;

    const movieMatch = path.match(/\/movie\/(\d+)/i);
    if (movieMatch) {
        return playMovie(movieMatch[1]);
    }

    const tvMatch = path.match(/\/tv\/(\d+)\/S(\d+)\/E(\d+)/i);
    if (tvMatch) {
        return playEpisode(tvMatch[1], tvMatch[2], tvMatch[3]);
    }

    /* Fallback: ?url= query param or hardcoded default */
    const hlsUrl =
        urlParams.get('url') ||
        'https://vidmmo.com/hls/ZDBtrL1WMPQipj3EubEdG6tAKeYJ0Nt3/master.m3u8';

    initHlsPlayer(hlsUrl);
}

/* -------------------------------------------------------------------------
   TMDB TITLE FETCHING
   ------------------------------------------------------------------------- */
const TMDB_PROXY = 'https://search-proxy.bingeoutofficial.workers.dev';

async function fetchAndSetTitle(type, id, season, episode) {
    try {
        if (type === 'movie') {
            const res = await fetch(`${TMDB_PROXY}/movie/${id}`);
            if (!res.ok) return;
            const data = await res.json();
            document.getElementById('title-main-text').textContent = data.title || '';
            document.getElementById('mobile-title-main').textContent = data.title || '';
            document.title = data.title || document.title;
        } else if (type === 'tv') {
            const [seriesRes, epRes] = await Promise.all([
                fetch(`${TMDB_PROXY}/tv/${id}`),
                fetch(`${TMDB_PROXY}/tv/${id}/season/${season}/episode/${episode}`)
            ]);
            const series = seriesRes.ok ? await seriesRes.json() : {};
            const ep     = epRes.ok     ? await epRes.json()     : {};
            const seriesName = series.name || '';
            const epName     = ep.name    || '';
            const label      = `S${season}:E${episode}`;
            const fullTitle  = [seriesName, label, epName].filter(Boolean).join(' ');
            const mobileTitle = `${label} "${epName || seriesName}"`;
            document.getElementById('title-main-text').textContent = fullTitle;
            document.getElementById('mobile-title-main').textContent = mobileTitle;
            document.title = fullTitle || document.title;
        }
    } catch (e) {
        /* Silently ignore — title is non-critical */
        console.warn('fetchAndSetTitle failed:', e.message);
    }
}

/* -------------------------------------------------------------------------
   SUBTITLES FROM GITHUB subtitles.json
   ------------------------------------------------------------------------- */
const GITHUB_RAW = 'https://raw.githubusercontent.com/Watchout2025/api/refs/heads/main';

const LANG_LABELS = {
    eng:'English', hin:'Hindi', ara:'Arabic', fra:'French', spa:'Spanish',
    por:'Portuguese', rus:'Russian', zho:'Chinese', jpn:'Japanese', kor:'Korean',
    ger:'German', ita:'Italian', tam:'Tamil', tel:'Telugu', mal:'Malayalam',
    ben:'Bengali', mar:'Marathi', urd:'Urdu', pol:'Polish', tur:'Turkish',
    nld:'Dutch', swe:'Swedish', nor:'Norwegian', dan:'Danish', fin:'Finnish',
    ind:'Indonesian', tha:'Thai', vie:'Vietnamese', ces:'Czech', hun:'Hungarian',
    ron:'Romanian', bul:'Bulgarian', hrv:'Croatian', srp:'Serbian', slk:'Slovak',
    ukr:'Ukrainian', heb:'Hebrew', fas:'Persian', msa:'Malay',
};

function langLabel(code) {
    return LANG_LABELS[code] || code.toUpperCase();
}

function srtToVtt(srt) {
    // Convert SRT subtitle format to WebVTT format (required by HTML5 <track>)
    // line:85% pushes cues above the controls bar, align:center keeps them centred
    let vtt = 'WEBVTT\n\n';
    const body = srt
        .replace(/\r\n/g, '\n').replace(/\r/g, '\n')
        .replace(/(\d{2}:\d{2}:\d{2}),(\d{3})/g, '$1.$2')
        .trim();
    // Inject position cue settings on every timestamp line
    vtt += body.replace(
        /(\d{2}:\d{2}:\d{2}\.\d{3}\s*-->\s*\d{2}:\d{2}:\d{2}\.\d{3})/g,
        '$1 line:85% position:50% align:center'
    );
    return vtt;
}

// Track blob URLs so we can revoke them when reloading
const _subtitleBlobUrls = [];

function _revokeAllSubtitleBlobs() {
    while (_subtitleBlobUrls.length) {
        URL.revokeObjectURL(_subtitleBlobUrls.pop());
    }
}

async function loadSubtitlesFromGithub(type, id, season, episode) {
    let jsonPath;
    if (type === 'movie') {
        jsonPath = `${GITHUB_RAW}/sub/movie/${id}/subtitles.json`;
    } else {
        jsonPath = `${GITHUB_RAW}/sub/tv/${id}/${season}/${episode}/subtitles.json`;
    }

    try {
        const res = await fetch(jsonPath, { cache: 'no-store' });
        if (!res.ok) return; // No subtitles yet — silent fail

        const data = await res.json();
        const subs = data.subtitles || {};
        const langs = Object.keys(subs);
        if (!langs.length) return;

        // Fetch all SRT files and convert to VTT blob URLs in parallel
        const trackData = await Promise.all(langs.map(async (lang) => {
            try {
                const srtRes = await fetch(subs[lang], { cache: 'no-store' });
                if (!srtRes.ok) return null;
                const srtText = await srtRes.text();
                const vttText = srtToVtt(srtText);
                const blob = new Blob([vttText], { type: "text/vtt;charset=utf-8" });
                const blobUrl = URL.createObjectURL(blob);
                _subtitleBlobUrls.push(blobUrl);
                return { lang, blobUrl };
            } catch (err) {
                console.warn(`Failed to load subtitle for ${lang}:`, err.message);
                return null;
            }
        }));

        const validTracks = trackData.filter(Boolean);
        if (!validTracks.length) return;

        // Wait until video element is ready to accept tracks
        const inject = () => {
            // Remember which textTrack index is currently showing (before we touch the DOM)
            const allBefore = Array.from(video.textTracks)
                .filter(t => t.kind === 'subtitles' || t.kind === 'captions');
            const showingBefore = allBefore.findIndex(t => t.mode === 'showing');

            // Remove previously injected GitHub tracks
            Array.from(video.querySelectorAll('track[data-github]')).forEach(t => t.remove());

            validTracks.forEach(({ lang, blobUrl }) => {
                const track = document.createElement('track');
                track.kind    = 'subtitles';
                track.label   = langLabel(lang);
                track.srclang = lang;
                track.src     = blobUrl;
                track.setAttribute('data-github', '1');
                track.default = false;
                video.appendChild(track);
            });

            // If a subtitle was already showing before GitHub tracks were (re-)injected,
            // make sure that same track (by position) stays showing and nothing else does.
            if (showingBefore !== -1) {
                const allAfter = Array.from(video.textTracks)
                    .filter(t => t.kind === 'subtitles' || t.kind === 'captions');
                allAfter.forEach((t, i) => {
                    t.mode = (i === showingBefore) ? 'showing' : 'disabled';
                });
            }

            // Re-render the subtitle menu so new tracks appear
            renderTracksMenu();
        };

        if (video.readyState >= 1) {
            inject();
        } else {
            video.addEventListener('loadedmetadata', inject, { once: true });
        }

    } catch (e) {
        // Silently ignore — subtitles are optional
        console.warn('Could not load subtitles.json:', e.message);
    }
}

/* -------------------------------------------------------------------------
   SUBTITLES FROM WYZIE (OpenSubtitles proxy)
   Priority order in menu: HLS → GitHub → Wyzie

   LAZY LOADING: Only the Wyzie search API is called on page load to get
   the track list. Actual SRT files are only fetched when the user clicks
   a Wyzie subtitle. This avoids downloading 10–20 subtitle files upfront
   and makes tracks appear in the menu immediately.
   ------------------------------------------------------------------------- */
const WYZIE_API    = 'https://sub.wyzie.io/search';
const WYZIE_KEY    = 'wyzie-ea127adc7693d78810f9cf157f267ea0';

async function fetchAndActivateWyzieTrack(trackEl) {
    const lazyUrl = trackEl.getAttribute('data-lazy-url');
    if (!lazyUrl) return true; // already loaded

    try {
        const srtRes = await fetch(lazyUrl, { cache: 'no-store' });
        if (!srtRes.ok) throw new Error(`HTTP ${srtRes.status}`);
        const srtText = await srtRes.text();
        const vttText = srtToVtt(srtText);
        const blob    = new Blob([vttText], { type: 'text/vtt;charset=utf-8' });
        const blobUrl = URL.createObjectURL(blob);
        _subtitleBlobUrls.push(blobUrl);
        trackEl.src = blobUrl;
        trackEl.removeAttribute('data-lazy-url');
        return true;
    } catch (err) {
        console.warn('Wyzie lazy fetch failed:', err.message);
        return false;
    }
}

let _wyzieLoading = false;

async function loadSubtitlesFromWyzie(type, id, season, episode) {
    _wyzieLoading = true;
    renderTracksMenu(); // immediately show loading state in menu if already open
    try {
        // Build query URL — metadata only, SRT files fetched lazily on selection
        let apiUrl = `${WYZIE_API}?id=${id}&key=${WYZIE_KEY}`;
        if (type === 'tv') {
            apiUrl += `&season=${season}&episode=${episode}`;
        }

        const res = await fetch(apiUrl, { cache: 'no-store' });
        if (!res.ok) { _wyzieLoading = false; renderTracksMenu(); return; }

        const tracks = await res.json();
        if (!Array.isArray(tracks) || !tracks.length) { _wyzieLoading = false; renderTracksMenu(); return; }

        // Inject placeholder <track> elements immediately — no SRT fetch yet.
        // The actual SRT is downloaded only when the user selects a track.
        const inject = () => {
            // Remove previously injected Wyzie tracks before re-injecting
            Array.from(video.querySelectorAll('track[data-wyzie]')).forEach(t => t.remove());

            tracks.forEach((track) => {
                const el = document.createElement('track');
                el.kind    = 'subtitles';
                el.label   = (track.display || track.language) + (track.isHearingImpaired ? ' [CC]' : '');
                el.srclang = track.language;
                // Do NOT set el.src — store the SRT URL for lazy loading on selection
                el.setAttribute('data-wyzie', '1');
                el.setAttribute('data-lazy-url', track.url);
                el.default = false;
                video.appendChild(el);
            });

            // Tracks have no src so the browser won't auto-activate them,
            // but defensively mark any that slipped through as disabled.
            Array.from(video.textTracks)
                .filter(t => t.kind === 'subtitles' || t.kind === 'captions')
                .forEach(t => {
                    const el = Array.from(video.querySelectorAll('track[data-wyzie]'))
                        .find(el => el.label === t.label && el.srclang === t.language);
                    if (el && el.hasAttribute('data-lazy-url')) t.mode = 'disabled';
                });

            // Re-render menu so Wyzie tracks appear immediately after GitHub tracks
            _wyzieLoading = false;
            renderTracksMenu();
        };

        if (video.readyState >= 1) {
            inject();
        } else {
            video.addEventListener('loadedmetadata', inject, { once: true });
        }

    } catch (e) {
        _wyzieLoading = false;
        renderTracksMenu();
        console.warn('Wyzie subtitle load failed:', e.message);
    }
}

window.onload = () => { setupUIControls(); resolveAndPlay(); };

/* -------------------------------------------------------------------------
   REPORT ISSUE MODAL
   ------------------------------------------------------------------------- */
const reportModal = document.getElementById('reportModal');
const issueTypeSelect = document.getElementById('issueType');
const submitBtn = document.getElementById('submitBtn');

document.getElementById('report-button').addEventListener('click', openReportModal);

issueTypeSelect.addEventListener('change', () => {
  submitBtn.disabled = issueTypeSelect.value === '';
});

function openReportModal() {
  reportModal.classList.add('active');
}

function closeReportModal() {
  reportModal.classList.remove('active');
}

// Close when clicking backdrop
reportModal.addEventListener('click', (e) => {
  if (e.target === reportModal) closeReportModal();
});




async function submitIssue() {
  const type = issueTypeSelect.value;
  const desc = document.getElementById('issueDesc').value;
  submitBtn.disabled = true;
  try {
    const res = await fetch('https://report.bingeoutofficial.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        issueType: type,
        description: desc,
        pageUrl: location.href
      })
    });
    if (!res.ok) throw new Error('Failed');
    alert('Issue reported successfully');
    closeReportModal();
    issueTypeSelect.value = '';
    document.getElementById('issueDesc').value = '';
    submitBtn.disabled = true;
  } catch (e) {
    alert('Failed to report issue. Try again.');
  } finally {
    submitBtn.disabled = issueTypeSelect.value === '';
  }
}
