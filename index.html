<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Player</title>

<link rel="stylesheet" href="https://unpkg.com/artplayer/dist/artplayer.css">

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial;
}

#loading {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #000;
  z-index: 10;
}

#loading img {
  width: 150px;
  border-radius: 10px;
  margin-bottom: 10px;
}

#sources {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-height: 40%;
  overflow-y: auto;
  background: rgba(0,0,0,0.9);
  display: none;
  padding: 10px;
}

.source {
  padding: 10px;
  border-bottom: 1px solid #333;
  cursor: pointer;
}

#error {
  color: red;
  padding: 10px;
}
</style>
</head>

<body>

<div id="loading">
  <img id="poster">
  <div id="title">Loading...</div>
</div>

<div id="player"></div>
<div id="sources"></div>
<div id="error"></div>

<script src="https://unpkg.com/artplayer/dist/artplayer.js"></script>

<script>

const TMDB_API = "YOUR_TMDB_API_KEY";

const params = new URLSearchParams(location.search);
const id = params.get("id");
const season = params.get("s");
const episode = params.get("e");

const isSeries = season && episode;

const providerBase = "https://hdhub.thevolecitor.qzz.io/eyJ0b3Jib3giOiJ1bnNldCIsInF1YWxpdGllcyI6IjEwODBwLDcyMHAiLCJzb3J0IjoiZGVzYyJ9";

function buildUrl() {
  if (isSeries) {
    return `${providerBase}/stream/series/${id}:${season}:${episode}.json`;
  } else {
    return `${providerBase}/stream/movie/${id}/1/1.json`;
  }
}

async function fetchJSON(url) {
  try {
    const res = await fetch(url, {
      headers: {
        "accept": "application/json",
        "origin": location.origin,
      }
    });

    const text = await res.text();

    if (text.startsWith("<")) {
      throw new Error("HTML RESPONSE (WRONG URL OR BLOCKED)");
    }

    return JSON.parse(text);

  } catch (e) {
    document.getElementById("error").innerText = "ERROR:\n" + e;
    throw e;
  }
}

async function loadTMDB() {
  try {
    const res = await fetch(`https://api.themoviedb.org/3/find/${id}?api_key=${TMDB_API}&external_source=imdb_id`);
    const data = await res.json();

    const item = data.movie_results[0] || data.tv_results[0];

    if (item) {
      document.getElementById("poster").src = "https://image.tmdb.org/t/p/w500" + item.poster_path;
      document.getElementById("title").innerText = item.title || item.name;
    }

  } catch {}
}

function parseStreams(data) {
  let list = [];

  (data.streams || []).forEach(s => {
    if (!s.url) return;

    // Allow only specific servers
    if (!/fsl|fslv2|castle|hubcdn|pixeldrain/i.test(s.name)) return;

    list.push({
      name: s.name + " • " + (s.quality || ""),
      url: s.url
    });
  });

  return list;
}

function createPlayer(url, sources) {

  const art = new Artplayer({
    container: "#player",
    url: url,
    autoplay: true,
    fullscreen: true,
    autoOrientation: true,

    settings: [
      {
        html: "Sources",
        click: function () {
          toggleSources();
        }
      }
    ]
  });

  // 🔊 500% BOOST
  const ctx = new AudioContext();
  const source = ctx.createMediaElementSource(art.video);
  const gain = ctx.createGain();
  gain.gain.value = 5;
  source.connect(gain).connect(ctx.destination);

  window.art = art;
}

function renderSources(list) {
  const box = document.getElementById("sources");
  box.innerHTML = "";

  list.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "source";
    div.innerText = s.name;

    div.onclick = () => {
      art.switchUrl(s.url);
      box.style.display = "none";
    };

    box.appendChild(div);
  });
}

function toggleSources() {
  const box = document.getElementById("sources");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

async function init() {

  await loadTMDB();

  const url = buildUrl();

  let data = await fetchJSON(url);

  let streams = parseStreams(data);

  if (!streams.length) {
    document.getElementById("error").innerText = "No streams found";
    return;
  }

  renderSources(streams);

  createPlayer(streams[0].url, streams);

  document.getElementById("loading").style.display = "none";
}

init();

</script>

</body>
</html>
