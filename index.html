<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloud Player Pro - Ultimate Edition</title>
    
    <link rel="stylesheet" href="https://unpkg.com/artplayer/dist/artplayer.css">
    
    <style>
        :root {
            --flixer-red: #e50914;
            --bg-dark: #000000;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-dark); color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; 
        }

        /* --- LANDSCAPE ENFORCEMENT --- */
        #orientation-overlay {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .phone-icon {
            width: 50px; height: 90px; border: 3px solid #fff; border-radius: 8px;
            position: relative; animation: rotateAnim 2s infinite ease-in-out;
        }
        @keyframes rotateAnim {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }
        @media screen and (orientation: portrait) { #orientation-overlay { display: flex; } }

        /* --- PLAYER CONTAINER --- */
        #artplayer-container { width: 100vw; height: 100vh; }

        /* --- CUSTOM FLIXER LAYERS --- */
        .flixer-sidebar {
            position: absolute; left: 0; top: 0; bottom: 0;
            width: 70px; background: linear-gradient(to right, rgba(0,0,0,0.9), transparent);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; gap: 35px; z-index: 20;
        }
        .side-item {
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; opacity: 0.7; transition: 0.3s;
        }
        .side-item:hover { opacity: 1; transform: scale(1.1); color: var(--flixer-red); }
        .side-item svg { width: 26px; height: 26px; fill: currentColor; }
        .side-item span { font-size: 9px; margin-top: 5px; text-transform: uppercase; font-weight: 700; }

        .flixer-title {
            position: absolute; top: 25px; right: 40px;
            font-size: 18px; font-weight: bold; text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            z-index: 20; color: #fff; pointer-events: none;
        }

        /* --- LOADER --- */
        #loader-screen {
            position: fixed; inset: 0; background: #000; z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #loader-poster {
            width: 150px; height: 220px; border-radius: 10px;
            object-fit: cover; box-shadow: 0 0 30px rgba(229, 9, 20, 0.4);
            margin-bottom: 20px; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }
        
        /* Overriding Artplayer Red */
        .art-progress-played { background: var(--flixer-red) !important; }
        .art-progress-indicator { background: var(--flixer-red) !important; }
    </style>
</head>
<body>

    <div id="orientation-overlay">
        <div class="phone-icon"></div>
        <p style="margin-top: 20px; font-weight: bold; letter-spacing: 1px;">PLEASE ROTATE YOUR DEVICE</p>
    </div>

    <div id="loader-screen">
        <img id="loader-poster" src="" alt="">
        <div id="loader-text" style="color: var(--flixer-red); font-weight: bold; letter-spacing: 2px;">SYNCHRONIZING...</div>
    </div>

    <div id="artplayer-container"></div>

    <script src="https://unpkg.com/artplayer/dist/artplayer.js"></script>

    <script>
        const TMDB_KEY = "81f645c3d9ced06a366b0d829d844cfe";
        const STREAM_API = "https://hdhub.thevolecitor.qzz.io/eyJ0b3Jib3giOiJ1bnNldCIsInF1YWxpdGllcyI6IjEwODBwLDcyMHAiLCJzb3J0IjoiZGVzYyJ9/stream";
        
        // --- DATA EXTRACTION ---
        const path = window.location.pathname;
        const params = new URLSearchParams(window.location.search);
        const imdbId = (path.match(/tt\d+/) || [params.get("id")])[0];
        const nums = path.split('/').filter(x => x && !x.includes('tt') && !isNaN(x));
        const season = nums[0] || params.get("s");
        const episode = nums[1] || params.get("e");
        const isSeries = !!(season && episode);

        async function bootstrap() {
            if (!imdbId) {
                document.getElementById('loader-text').innerText = "ERROR: NO IMDB ID";
                return;
            }

            // Load Metadata
            fetch(`https://api.themoviedb.org/3/find/${imdbId}?api_key=${TMDB_KEY}&external_source=imdb_id`)
                .then(r => r.json()).then(data => {
                    const item = data.movie_results[0] || data.tv_results[0];
                    if (item) {
                        document.getElementById('loader-poster').src = `https://image.tmdb.org/t/p/w500${item.poster_path}`;
                        window.mediaTitle = isSeries ? `S${season}:E${episode} - ${item.name}` : item.title;
                    }
                });

            // Fetch Streams
            const apiUrl = isSeries 
                ? `${STREAM_API}/series/${imdbId}:${season}:${episode}.json` 
                : `${STREAM_API}/movie/${imdbId}.json`;

            try {
                // Try Primary Proxy (AllOrigins)
                let response = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`);
                
                // Fallback Proxy if Primary fails
                if (!response.ok) {
                    response = await fetch(`https://corsproxy.io/?${encodeURIComponent(apiUrl)}`);
                }

                const data = await response.json();
                const streams = (data.streams || []).map(s => {
                    let finalUrl = s.url;
                    // Fix Pixeldrain Download Logic
                    if (s.name.toLowerCase().includes("pixeldrain")) {
                        const pxId = finalUrl.split("/u/")[1] || finalUrl.split("/").pop();
                        finalUrl = `https://pixeldrain.com/api/file/${pxId}?download`;
                    }
                    return { name: s.name, url: finalUrl };
                });

                if (streams.length === 0) throw "No sources found";
                initPlayer(streams);

            } catch (err) {
                document.getElementById('loader-text').innerText = "STREAM FAILED TO LOAD";
                console.error(err);
            }
        }

        function initPlayer(sources) {
            const art = new Artplayer({
                container: '#artplayer-container',
                url: sources[0].url,
                autoplay: true,
                fullscreen: true,
                fullscreenWeb: true,
                autoSize: true,
                playbackRate: true,
                aspectRatio: true,
                setting: true,
                hotkey: true,
                pip: true,
                mutex: true,
                backdrop: true,
                playsInline: true,
                autoOrientation: true,
                // --- THE KEY TO LOADING DOWNLOAD LINKS ---
                type: 'm4v',
                customType: {
                    m4v: function(video, url) {
                        video.src = url;
                        // For FSL and other difficult links, we force an anonymous cross-origin
                        video.crossOrigin = "anonymous";
                    }
                },
                settings: [
                    {
                        width: 200,
                        html: 'SERVER LIST',
                        tooltip: sources[0].name,
                        selector: sources.map(s => ({
                            html: s.name,
                            url: s.url,
                            default: s === sources[0]
                        })),
                        onSelect: function (item) {
                            art.switchUrl(item.url);
                            return item.html;
                        },
                    },
                ],
                layers: [
                    {
                        name: 'sidebar',
                        html: `
                            <div class="flixer-sidebar">
                                <div class="side-item" onclick="art.setting.show = true">
                                    <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
                                    <span>Episodes</span>
                                </div>
                                <div class="side-item" onclick="art.setting.show = true">
                                    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
                                    <span>Subtitles</span>
                                </div>
                                <div class="side-item" onclick="art.setting.show = true">
                                    <svg viewBox="0 0 24 24"><path d="M20 13H4c-.55 0-1 .45-1 1v6c0 .55.45 1 1 1h16c.55 0 1-.45 1-1v-6c0-.55-.45-1-1-1zM7 19c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM20 3H4c-.55 0-1 .45-1 1v6c0 .55.45 1 1 1h16c.55 0 1-.45 1-1V4c0-.55-.45-1-1-1zM7 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
                                    <span>Servers</span>
                                </div>
                            </div>
                        `,
                        style: { display: 'block' },
                    },
                    {
                        name: 'title',
                        html: `<div class="flixer-title">${window.mediaTitle || 'Streaming...'}</div>`,
                        style: { display: 'block' }
                    }
                ]
            });

            art.on('ready', () => {
                document.getElementById('loader-screen').style.display = 'none';
                
                // Audio Boost Logic (5.0 Gain)
                const actx = new (window.AudioContext || window.webkitAudioContext)();
                const src = actx.createMediaElementSource(art.video);
                const gain = actx.createGain();
                gain.gain.value = 5;
                src.connect(gain).connect(actx.destination);
            });

            // Fail-safe: If video errors, try to reload once
            art.on('video:error', () => {
                console.log("Source error, attempting proxy switch...");
                // Switching type to 'direct' sometimes helps mobile browsers
                art.video.src = art.url; 
            });

            window.art = art;
        }

        bootstrap();
    </script>
</body>
</html>
