const mobileSkipBackwardButton = document.getElementById('mobile-skip-backward-button');
const mobileSkipForwardButton  = document.getElementById('mobile-skip-forward-button');

/* -------------------------------------------------------------------------
   DOUBLE-TAP SKIP + LEFT/RIGHT HINT
   ------------------------------------------------------------------------- */
let lastTap = 0;
videoContainer.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTap < 350) {
        const rect = video.getBoundingClientRect();
        const x = e.changedTouches[0].clientX - rect.left;
        if (x < rect.width / 2) { handleSkipBackward(); } else { handleSkipForward(); }
    }
    lastTap = now;
});

function showSkipHint(text, isBackward) { /* disabled */ }
function handleSkipBackward() { video.currentTime = Math.max(0, video.currentTime - 10); resetInactivityTimer(); }
function handleSkipForward()  { video.currentTime = Math.min(video.duration, video.currentTime + 10); resetInactivityTimer(); }

/* -------------------------------------------------------------------------
   PLAYBACK-SPEED UI
   ------------------------------------------------------------------------- */
const speedButton   = document.getElementById('speed-button');
const speedMenu     = document.getElementById('speed-menu');
const speedList     = document.getElementById('speed-list');

const SPEED_OPTIONS = [

    { label: 'Normal',value: 1    },
    { label: '1.25x', value: 1.25 },
    { label: '1.5x',  value: 1.5  },
    { label: '1.75x', value: 1.75 },
    { label: '2x',    value: 2    }
];

const urlParams   = new URLSearchParams(window.location.search);

let resolvedUrl   = null;
let hlsInstance   = null;

const languageCodeMap = {
    'eng':'English','en':'English','und':'Undefined',
    'hin':'Hindi','hi':'Hindi',
    'tel':'Telugu','te':'Telugu',
    'tam':'Tamil','ta':'Tamil',
    'kan':'Kannada','kn':'Kannada',
    'spa':'Spanish','es':'Spanish',
    'fre':'French','fr':'French',
    'ger':'German','de':'German',
    'ita':'Italian','it':'Italian',
    'jpn':'Japanese','ja':'Japanese',
    'por':'Portuguese','pt':'Portuguese',
    'rus':'Russian','ru':'Russian',
    'zho':'Chinese','zh':'Chinese',
    'ara':'Arabic','ar':'Arabic',
    'kor':'Korean','ko':'Korean'
};
function getFullLanguageName(code) {
    if (!code) return '';
    const lc = code.toLowerCase();
    return languageCodeMap[lc] || code.charAt(0).toUpperCase() + code.slice(1);
}

/* -------------------------------------------------------------------------

   ------------------------------------------------------------------------- */
function displayError(msg) {
    console.error(msg);
    errorMessageDiv.textContent = msg;
    errorMessageDiv.classList.remove('hidden');
}
function showLoader() {
    loadingIndicator.classList.remove('hidden');
    centerPlayPauseOverlay.classList.remove('opacity-100','pointer-events-auto');
    centerPlayPauseOverlay.classList.add('opacity-0','pointer-events-none');
}
function hideLoader() {
    loadingIndicator.classList.add('hidden');
    resetInactivityTimer();
}
function formatTime(totalSec) {
    if (isNaN(totalSec) || totalSec < 0) return '0:00';
    const sec = Math.floor(totalSec % 60);
    const min = Math.floor(totalSec / 60) % 60;
    const hrs = Math.floor(totalSec / 3600);
    const pad = n => n.toString().padStart(2,'0');
    return hrs ? `${hrs}:${pad(min)}:${pad(sec)}` : `${min}:${pad(sec)}`;
}
function updateBufferProgress() {
    if (!video.duration || video.duration === Infinity) return;
    const buffered = video.buffered;
    if (buffered.length === 0) { bufferIndicator.style.width = '0%'; return; }
    let furthest = 0;
    for (let i = 0; i < buffered.length; i++) furthest = Math.max(furthest, buffered.end(i));
    bufferIndicator.style.width = `${Math.min(100, (furthest / video.duration) * 100)}%`;
}
function updateProgress() {
    if (!video.duration || isSeeking) return;
    const pct = (video.currentTime / video.duration) * 100;
    progressIndicator.style.width = `${pct}%`;
    seekThumb.style.left = `calc(${pct}% - 3px)`;
    remainingTimeDisplay.textContent = `-${formatTime(video.duration - video.currentTime)}`;
}
function showControls() {
    bottomOverlay.classList.remove('controls-hidden');
    bottomOverlay.classList.add('controls-visible');
    if (loadingIndicator.classList.contains('hidden')) {
        centerPlayPauseOverlay.classList.remove('opacity-0','pointer-events-none');
        centerPlayPauseOverlay.classList.add('opacity-100','pointer-events-auto');
    }
}
function hideControls() {
    if (audioSubtitleMenu.classList.contains('hidden') && speedMenu.classList.contains('hidden')) {
        bottomOverlay.classList.remove('controls-visible');
        bottomOverlay.classList.add('controls-hidden');
        centerPlayPauseOverlay.classList.remove('opacity-100','pointer-events-auto');
        centerPlayPauseOverlay.classList.add('opacity-0','pointer-events-none');
    }
}
function updateBottomPlayPauseIcon(paused) {
    if (paused) { playIcon.classList.remove('hidden'); pauseIcon.classList.add('hidden'); }
    else        { playIcon.classList.add('hidden'); pauseIcon.classList.remove('hidden'); }

/* -------------------------------------------------------------------------
   SEEKING
   ------------------------------------------------------------------------- */
function calculateNewTime(clientX) {
    const rect = seekBar.getBoundingClientRect();
    let pos = clientX - rect.left;
    pos = Math.max(0, Math.min(pos, rect.width));
    return video.duration * (pos / rect.width);
}
function handleSeek(clientX) {
    if (!video.duration || video.duration === Infinity) return;
    const newTime = calculateNewTime(clientX);
    const pct = (newTime / video.duration) * 100;
    progressIndicator.style.width = `${pct}%`;
    seekThumb.style.left = `calc(${pct}% - 3px)`;
    remainingTimeDisplay.textContent = `-${formatTime(video.duration - newTime)}`;
}
function startSeeking(e) {
    if (!video.duration || video.duration === Infinity) return;
    isSeeking = true;
    showControls();
    seekThumb.classList.add('scale-100');
    currentMouseMoveHandler = ev => handleSeek(ev.clientX);
    currentTouchMoveHandler = ev => handleSeek(ev.touches[0].clientX);
    window.addEventListener('mousemove', currentMouseMoveHandler);
    window.addEventListener('mouseup', endSeeking);
    window.addEventListener('touchmove', currentTouchMoveHandler, {passive:true});
    window.addEventListener('touchend', endSeeking);
    handleSeek(e.touches ? e.touches[0].clientX : e.clientX);
}
function endSeeking(e) {
    if (!isSeeking) return;
    const x = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
    video.currentTime = calculateNewTime(x);
    isSeeking = false;
    seekThumb.classList.remove('scale-100');
    if (currentMouseMoveHandler) { window.removeEventListener('mousemove', currentMouseMoveHandler); currentMouseMoveHandler = null; }
    window.removeEventListener('mouseup', endSeeking);
    window.removeEventListener('touchend', endSeeking);
    resetInactivityTimer();
}

function isMobileDevice() {

function lockLandscape() { try { if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(() => {}); } catch(e){} }
function unlockOrientation() { try { if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock(); } catch(e){} }
function isInFullscreen() { return !!(document.fullscreenElement || document.webkitFullscreenElement || video.webkitDisplayingFullscreen); }
function toggleFullscreen() {

function handleTrackSelection(type, idx, hlsIdx) {
    if (type === 'audio') {
        if (isHlsJsMode && hlsInstance) hlsInstance.audioTrack = idx;
        else if (video.audioTracks) { for (let i=0;i<video.audioTracks.length;i++) video.audioTracks[i].enabled = (i===idx); }
        audioSubtitleMenu.classList.add('hidden'); renderTracksMenu(); resetInactivityTimer(); return;
    }
    if (type !== 'subtitle') return;
    const subs = video.textTracks ? Array.from(video.textTracks).filter(t => t.kind === 'subtitles' || t.kind === 'captions') : [];
    if (idx === -1) {
        if (isHlsJsMode && hlsInstance) hlsInstance.subtitleTrack = -1;
        subs.forEach(t => t.mode = 'disabled');
        audioSubtitleMenu.classList.add('hidden'); renderTracksMenu(); resetInactivityTimer(); return;
    }
    const trackElements = Array.from(video.querySelectorAll('track'));
    const targetTextTrack = subs[idx];
    const matchingEl = targetTextTrack ? trackElements.find(el => el.hasAttribute('data-wyzie') && el.hasAttribute('data-lazy-url') && el.label === targetTextTrack.label && el.srclang === targetTextTrack.language) : null;
    if (matchingEl) {
        if (isHlsJsMode && hlsInstance) hlsInstance.subtitleTrack = -1;
        subs.forEach(t => { t.mode = 'disabled'; });
        const menuItems = document.querySelectorAll('#subtitle-list .track-selector');
        menuItems.forEach((li) => {
            if (parseInt(li.dataset.index) === idx) { li.style.opacity = '0.5'; li.style.pointerEvents = 'none'; const lbl = li.querySelector('span:last-child'); if (lbl) lbl.textContent += ' (loading…)'; }
        });
        fetchAndActivateWyzieTrack(matchingEl).then(ok => {
            if (ok) {
                const freshSubs = Array.from(video.textTracks).filter(t => t.kind === 'subtitles' || t.kind === 'captions');
                freshSubs.forEach((t, i) => { t.mode = (i === idx) ? 'showing' : 'disabled'; });
                const showing = freshSubs.filter(t => t.mode === 'showing');
                if (showing.length > 1) showing.slice(1).forEach(t => { t.mode = 'disabled'; });
            }
            audioSubtitleMenu.classList.add('hidden'); renderTracksMenu(); resetInactivityTimer();
        });
        return;
    }
    if (hlsIdx !== undefined && hlsIdx >= 0) {
        if (isHlsJsMode && hlsInstance) hlsInstance.subtitleTrack = hlsIdx;
        subs.forEach((t, i) => { t.mode = (i === idx) ? 'showing' : 'disabled'; });
    } else {
        if (isHlsJsMode && hlsInstance) hlsInstance.subtitleTrack = -1;
        subs.forEach((t, i) => { t.mode = (i === idx) ? 'showing' : 'disabled'; });
    }
    const showingTracks = subs.filter(t => t.mode === 'showing');
    if (showingTracks.length > 1) showingTracks.slice(1).forEach(t => { t.mode = 'disabled'; });
    audioSubtitleMenu.classList.add('hidden'); renderTracksMenu(); resetInactivityTimer();
}

/* -------------------------------------------------------------------------
   RESUME / LOCAL STORAGE
   ------------------------------------------------------------------------- */
function generateStorageKey(url) { return `video_progress:${url}`; }
function saveVideoProgress() {
    if (!video.duration || isNaN(video.duration) || video.duration === Infinity) return;
    if (video.currentTime < 1 || video.currentTime > video.duration - 5) return;
    try {
        const data = { currentTime: video.currentTime, duration: video.duration, timestamp: Date.now(), url: resolvedUrl };
        localStorage.setItem(videoStorageKey, JSON.stringify(data));
    } catch(e) { console.error('save progress error', e); }
}
function restoreVideoProgress() {
    if (hasRestoredPosition) return;
    if (!video.duration || isNaN(video.duration) || video.duration === Infinity) return;
    try {
        const raw = localStorage.getItem(videoStorageKey);
        if (!raw) return;
        const data = JSON.parse(raw);
        if (data.url !== resolvedUrl || data.currentTime <= 1 || data.currentTime >= video.duration - 5) return;
        hasRestoredPosition = true;
        const seek = () => { video.currentTime = data.currentTime; };
        if (video.readyState >= 2) seek(); else video.addEventListener('canplay', seek, {once:true});
    } catch(e) { hasRestoredPosition = true; }
}
function clearVideoProgress() { try { localStorage.removeItem(videoStorageKey); } catch(e) { console.error(e); } }
function startProgressSaving() {
    saveProgressInterval = setInterval(saveVideoProgress, 5000);
    video.addEventListener('pause', saveVideoProgress);
    video.addEventListener('seeking', saveVideoProgress);
    video.addEventListener('ended', clearVideoProgress);
    window.addEventListener('beforeunload', saveVideoProgress);
}
function stopProgressSaving() {
    clearInterval(saveProgressInterval); saveProgressInterval = null;
    video.removeEventListener('pause', saveVideoProgress);
    video.removeEventListener('seeking', saveVideoProgress);
    video.removeEventListener('ended', clearVideoProgress);
    window.removeEventListener('beforeunload', saveVideoProgress);
}
function getMediaInfoFromUrl() {
    const path = window.location.pathname;
    const tvMatch = path.match(/\/tv\/(\d+)\/S(\d+)\/E(\d+)/i);
    if (tvMatch) return { mediaType:'tv', contentId:tvMatch[1], seasonNumber:Number(tvMatch[2]), episodeNumber:Number(tvMatch[3]) };
    const movieMatch = path.match(/\/movie\/(\d+)/i);
    if (movieMatch) return { mediaType:'movie', contentId:movieMatch[1] };
    return { mediaType:null, contentId:null };
}
function postTimeUpdateToParent() {
    if (window.parent !== window) {
        window.parent.postMessage({ event:'videoTimeUpdate', currentTime:video.currentTime, duration:video.duration, paused:video.paused, ...getMediaInfoFromUrl() }, '*');
    }
}

/* -------------------------------------------------------------------------
   VOLUME SLIDER
   ------------------------------------------------------------------------- */
function calculateNewVolume(clientY) {
    const rect = volumeSliderTrack.getBoundingClientRect();
    let dist = rect.bottom - clientY;
    dist = Math.max(0, Math.min(dist, rect.height));
    return dist / rect.height;
}
function handleVolumeAdjust(e) {
    e.preventDefault();
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    const vol = calculateNewVolume(y);
    video.volume = vol;
    if (vol > 0) { video.muted = false; lastKnownVolume = vol; } else video.muted = true;
    updateVolumeSlider();
}
function startVolumeAdjusting(e) {
    isVolumeAdjusting = true; e.preventDefault();
    window.addEventListener('mousemove', handleVolumeAdjust);
    window.addEventListener('mouseup', endVolumeAdjusting);
    window.addEventListener('touchmove', handleVolumeAdjust);
    window.addEventListener('touchend', endVolumeAdjusting);
    handleVolumeAdjust(e);
}
function endVolumeAdjusting() {
    if (!isVolumeAdjusting) return;
    isVolumeAdjusting = false;
    window.removeEventListener('mousemove', handleVolumeAdjust);
    window.removeEventListener('mouseup', endVolumeAdjusting);
    window.removeEventListener('touchmove', handleVolumeAdjust);
    window.removeEventListener('touchend', endVolumeAdjusting);
    resetInactivityTimer();
}
volumeSliderTrack.addEventListener('mousedown', startVolumeAdjusting);
volumeSliderTrack.addEventListener('touchstart', startVolumeAdjusting, {passive:true});

/* -------------------------------------------------------------------------
   KEYBOARD SHORTCUTS
   ------------------------------------------------------------------------- */
function handleKeyboardShortcuts(e) {
    if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
    const prevent = ['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'];
    if (prevent.includes(e.code)) e.preventDefault();
    switch (e.code) {
        case 'Space': case 'KeyK': toggleVideoPlayPause(); break;
        case 'ArrowLeft':  video.currentTime = Math.max(0, video.currentTime-5); resetInactivityTimer(); break;
        case 'ArrowRight': video.currentTime = Math.min(video.duration, video.currentTime+5); resetInactivityTimer(); break;
        case 'KeyJ': handleSkipBackward(); break;
        case 'KeyL': handleSkipForward();  break;
        case 'ArrowUp':   e.preventDefault(); video.volume = Math.min(1, video.volume+0.05); video.muted = false; lastKnownVolume = video.volume; updateVolumeSlider(); resetInactivityTimer(); break;
        case 'ArrowDown': e.preventDefault(); video.volume = Math.max(0, video.volume-0.05); if (video.volume===0) video.muted = true; updateVolumeSlider(); resetInactivityTimer(); break;
        case 'KeyM': toggleMute(); break;
        case 'KeyF': toggleFullscreen(); break;
        case 'KeyC':
            if (isHlsJsMode && hlsInstance) {
                const cur = hlsInstance.subtitleTrack;
                const nextIdx = cur === -1 ? 0 : -1;
                hlsInstance.subtitleTrack = nextIdx;
                const subs = Array.from(video.textTracks).filter(t=>t.kind==='subtitles'||t.kind==='captions');
                subs.forEach((t,i) => { t.mode = (nextIdx >= 0 && i === nextIdx) ? 'showing' : 'disabled'; });
            } else if (video.textTracks) {
                const subs = Array.from(video.textTracks).filter(t=>t.kind==='subtitles'||t.kind==='captions');
                const showing = subs.some(t=>t.mode==='showing');
                subs.forEach((t,i)=> t.mode = showing ? 'disabled' : (i===0?'showing':'disabled'));
            }
            renderTracksMenu(); resetInactivityTimer(); break;
        default:
            if (e.code.startsWith('Digit')) { const d = parseInt(e.code.replace('Digit','')); video.currentTime = (video.duration * d) / 10; resetInactivityTimer(); }
            else if (e.code === 'Home')   { video.currentTime = 0; resetInactivityTimer(); }
            else if (e.code === 'End')    { video.currentTime = video.duration; resetInactivityTimer(); }
            else if (e.code === 'Comma'  && video.paused) { video.currentTime = Math.max(0, video.currentTime-1/30); resetInactivityTimer(); }
            else if (e.code === 'Period' && video.paused) { video.currentTime = Math.min(video.duration, video.currentTime+1/30); resetInactivityTimer(); }
    }
}
document.addEventListener('keydown', handleKeyboardShortcuts);

/* -------------------------------------------------------------------------
   HLS / DIRECT VIDEO INITIALISATION
   ------------------------------------------------------------------------- */
function isDirectVideoUrl(url) {
    try { const path = new URL(url).pathname.toLowerCase(); return /\.(mp4|webm|ogg|ogv|mov|mkv|avi|flv|m4v)(\?|$)/.test(path); }
    catch(e) { return /\.(mp4|webm|ogg|ogv|mov|mkv|avi|flv|m4v)(\?|$)/.test(url.toLowerCase()); }
}

function initHlsPlayer(url) {
    saveVideoProgress();
    if (saveProgressInterval) { clearInterval(saveProgressInterval); saveProgressInterval = null; }
    stopProgressSaving();
    hasRestoredPosition = false;
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    Array.from(video.querySelectorAll('track[data-github], track[data-wyzie]')).forEach(t => t.remove());
    errorMessageDiv.classList.add('hidden');
    hasRestoredPosition = false;
    resolvedUrl     = url;
    videoStorageKey = generateStorageKey(url);

    if (isDirectVideoUrl(url)) {
        isHlsJsMode = false; showLoader();
        video.src = url;
        video.addEventListener('loadedmetadata', () => { renderTracksMenu(); hideLoader(); setupInactivityDetection(); restoreVideoProgress(); startProgressSaving(); video.play().catch(() => {}); }, {once:true});
        video.addEventListener('error', () => { displayError('Failed to load video: ' + (video.error ? video.error.message : 'unknown error')); hideLoader(); }, {once:true});
        return;
    }

    if (Hls.isSupported()) {
        isHlsJsMode = true; showLoader();
        const h = new Hls({ renderTextTracksNatively: true, subtitleDisplay: true });
        hlsInstance = h;
        h.on(Hls.Events.MEDIA_ATTACHED, () => h.loadSource(url));
        h.on(Hls.Events.MANIFEST_PARSED, renderTracksMenu);
        h.on(Hls.Events.AUDIO_TRACK_SWITCHED, renderTracksMenu);
        h.on(Hls.Events.SUBTITLE_TRACK_SWITCHED, renderTracksMenu);
        h.on(Hls.Events.ERROR, (ev, data) => { if (data.fatal) { displayError('Fatal HLS error'); h.destroy(); hideLoader(); } });

        function fixHlsCueLine(cue) {
            if (!(cue instanceof VTTCue)) return;
            cue.line = 85; cue.snapToLines = false; cue.position = 50; cue.align = 'center';
        }
        function patchTrackCues(track) {
            if (track.cues) Array.from(track.cues).forEach(fixHlsCueLine);
            track.addEventListener('cuechange', () => { if (track.cues) Array.from(track.cues).forEach(fixHlsCueLine); });
        }
        video.textTracks.addEventListener('addtrack', e => {
            const t = e.track;
            if (t.kind === 'subtitles' || t.kind === 'captions') {
                const el = Array.from(video.querySelectorAll('track')).find(el => el.label === t.label && el.srclang === t.language);
                if (!el || (!el.hasAttribute('data-github') && !el.hasAttribute('data-wyzie'))) patchTrackCues(t);
            }
        });

        h.attachMedia(video);
        video.addEventListener('loadedmetadata', () => restoreVideoProgress(), {once:true});
        video.addEventListener('canplay', () => { hideLoader(); setupInactivityDetection(); startProgressSaving(); video.play().catch(() => {}); }, {once:true});
    }
    else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        isHlsJsMode = false; showLoader();
        video.src = url;
        video.addEventListener('loadedmetadata', () => { renderTracksMenu(); hideLoader(); setupInactivityDetection(); restoreVideoProgress(); startProgressSaving(); video.play().catch(() => {}); }, {once:true});
    }
    else { displayError('Browser does not support HLS'); hideLoader(); }
}

/* -------------------------------------------------------------------------
   PRIMARY STREAM SOURCE — render.onrender.com API
   Retries up to 5 times, then falls back to GitHub.
   The returned raw m3u8 URL is wrapped through the proxy before being
   handed to initHlsPlayer().

   API slug formats:
     Movie:   movie.name.year          e.g. avatar.2009
     TV:      series.name.s01e01       e.g. breaking.bad.s01e01
   ------------------------------------------------------------------------- */
const RENDER_API  = 'https://workingg.vercel.app/api/proxy?url=https://u-1-1azw.onrender.com/api/get-stream';
const PROXY_BASE  = 'https://workingg.vercel.app/api/proxy?url=';
const MAX_RETRIES = 5;
const RETRY_DELAY = 2000; // ms between retries

/** Wrap a raw stream URL through the proxy */
function proxyUrl(rawUrl) {
    return PROXY_BASE + encodeURIComponent(rawUrl);
}

/**
 * Build the API slug for a movie or TV episode.
 * Title comes from TMDB: lowercase, spaces→dots, strip punctuation,
 * then append year (movie) or sXXeYY (TV).
 */
async function buildApiSlug(type, id, season, episode) {
    try {
        if (type === 'movie') {
            const res  = await fetch(`${TMDB_PROXY}/movie/${id}`);
            if (!res.ok) return null;
            const data = await res.json();
            const year = data.release_date ? data.release_date.slice(0, 4) : '';
            const name = (data.title || '').toLowerCase()
                .replace(/[^a-z0-9\s]/g, '')
                .trim()
                .replace(/\s+/g, '.');
            return year ? `${name}.${year}` : name;
        } else {
            const res  = await fetch(`${TMDB_PROXY}/tv/${id}`);
            if (!res.ok) return null;
            const data = await res.json();
            const name = (data.name || '').toLowerCase()
                .replace(/[^a-z0-9\s]/g, '')
                .trim()
                .replace(/\s+/g, '.');
            const s = String(season).padStart(2, '0');
            const e = String(episode).padStart(2, '0');
            return `${name}.s${s}e${e}`;
        }
    } catch (err) {
        console.warn('[RenderAPI] buildApiSlug failed:', err.message);
        return null;
    }
}

/**
 * Call the Render API with up to MAX_RETRIES attempts.
 * Returns the proxied m3u8 URL on success, or null on failure.
 */
async function fetchStreamFromRenderApi(slug) {
    for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
        try {
            const apiUrl = `${RENDER_API}?title=${encodeURIComponent(slug)}`;
            console.log(`[RenderAPI] Attempt ${attempt}/${MAX_RETRIES}: ${apiUrl}`);
            const res = await fetch(apiUrl, { cache: 'no-store' });
            if (!res.ok) {
                console.warn(`[RenderAPI] HTTP ${res.status} on attempt ${attempt}`);
            } else {
                const data = await res.json();
                // Accept any common key that holds an m3u8 URL
                const raw =
                    data.url        ||
                    data.stream_url ||
                    data.hls_url    ||
                    data.m3u8_url   ||
                    (typeof data === 'string' && data.includes('') ? data : null);
                if (raw && typeof raw === 'string' && raw.includes('.m3u8?v=xxxxxxxxxx')) {
                    console.log(`[RenderAPI] Got stream on attempt ${attempt}:`, raw);
                    return proxyUrl(raw);
                }
                console.warn(`[RenderAPI] No m3u8 in response on attempt ${attempt}`, data);
            }
        } catch (err) {
            console.warn(`[RenderAPI] Fetch error on attempt ${attempt}:`, err.message);
        }
        if (attempt < MAX_RETRIES) {
            await new Promise(r => setTimeout(r, RETRY_DELAY));
        }
    }
    console.warn('[RenderAPI] All retries exhausted.');
    return null;
}

/**
 * Master stream resolver.
 *   1. Tries Render API (primary) — URL is proxied before use.
 *   2. Falls back to GitHub raw files on failure.
 * Subtitles + title are loaded after the stream is resolved.
 */
async function resolveStreamWithFallback(type, id, season, episode) {
    showLoader();

    // Build API slug from TMDB title
    const slug = await buildApiSlug(type, id, season, episode);
    let primaryUrl = null;

    if (slug) {
        primaryUrl = await fetchStreamFromRenderApi(slug);
    } else {
        console.warn('[Stream] Could not build slug — skipping primary source.');
    }

    if (primaryUrl) {
        // ---- Primary succeeded ----
        console.log('[Stream] Using primary source (Render API + proxy)');
        _revokeAllSubtitleBlobs();
        stopProgressSaving();
        hasRestoredPosition = false;
        if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
        Array.from(video.querySelectorAll('track[data-github], track[data-wyzie]')).forEach(t => t.remove());
        errorMessageDiv.classList.add('hidden');
        resolvedUrl     = primaryUrl;
        videoStorageKey = generateStorageKey(primaryUrl);
        initHlsPlayer(primaryUrl);

        // Load subtitles and title
        if (type === 'movie') {
            loadSubtitlesFromGithub('movie', id);
            loadSubtitlesFromWyzie('movie', id);
            fetchAndSetTitle('movie', id);
        } else {
            loadSubtitlesFromGithub('tv', id, season, episode);
            loadSubtitlesFromWyzie('tv', id, season, episode);
            fetchAndSetTitle('tv', id, season, episode);
        }
    } else {
        // ---- Primary failed — fall back to GitHub ----
        console.warn('[Stream] Primary source failed. Falling back to GitHub.');
        if (type === 'movie') {
            await playMovieGithub(id);
        } else {
            await playEpisodeGithub(id, season, episode);
        }
        // subtitle/title loading is handled inside the Github fallback functions
    }
}

/* -------------------------------------------------------------------------
   START — Route dispatcher
           Movie:    /movie/{tmdbId}
           TV:       /tv/{tmdbId}/S{season}/E{episode}
           Fallback: ?url=  or hardcoded default
   ------------------------------------------------------------------------- */
async function resolveAndPlay() {
    const path = window.location.pathname;

    const movieMatch = path.match(/\/movie\/(\d+)/i);
    if (movieMatch) {
        return resolveStreamWithFallback('movie', movieMatch[1]);
    }

    const tvMatch = path.match(/\/tv\/(\d+)\/S(\d+)\/E(\d+)/i);
    if (tvMatch) {
        return resolveStreamWithFallback('tv', tvMatch[1], tvMatch[2], tvMatch[3]);
    }

    /* Fallback: ?url= query param or hardcoded default */
    const hlsUrl =
        urlParams.get('url') ||
        'https://vidmmo.com/hls/ZDBtrL1WMPQipj3EubEdG6tAKeYJ0Nt3/master.m3u8';
    initHlsPlayer(hlsUrl);
}

async function playMovieGithub(movieId) {
    _revokeAllSubtitleBlobs();
    showLoader();

    const githubUrl =
        `https://raw.githubusercontent.com/Watchout2025/api/refs/heads/main/hls/movie/${movieId}`;

    try {

async function playEpisodeGithub(seriesId, seasonNumber, episodeNumber) {

/* -------------------------------------------------------------------------
   SUBTITLES FROM GITHUB subtitles.json
   ------------------------------------------------------------------------- */
const GITHUB_RAW = 'https://raw.githubusercontent.com/Watchout2025/api/refs/heads/main';

const LANG_LABELS = {
    eng:'English', hin:'Hindi', ara:'Arabic', fra:'French', spa:'Spanish',
    por:'Portuguese', rus:'Russian', zho:'Chinese', jpn:'Japanese', kor:'Korean',
    ger:'German', ita:'Italian', tam:'Tamil', tel:'Telugu', mal:'Malayalam',
    ben:'Bengali', mar:'Marathi', urd:'Urdu', pol:'Polish', tur:'Turkish',
    nld:'Dutch', swe:'Swedish', nor:'Norwegian', dan:'Danish', fin:'Finnish',
    ind:'Indonesian', tha:'Thai', vie:'Vietnamese', ces:'Czech', hun:'Hungarian',
    ron:'Romanian', bul:'Bulgarian', hrv:'Croatian', srp:'Serbian', slk:'Slovak',
    ukr:'Ukrainian', heb:'Hebrew', fas:'Persian', msa:'Malay',
};
function langLabel(code) { return LANG_LABELS[code] || code.toUpperCase(); }

function srtToVtt(srt) {
    let vtt = 'WEBVTT\n\n';
    const body = srt.replace(/\r\n/g, '\n').replace(/\r/g, '\n').replace(/(\d{2}:\d{2}:\d{2}),(\d{3})/g, '$1.$2').trim();
    vtt += body.replace(/(\d{2}:\d{2}:\d{2}\.\d{3}\s*-->\s*\d{2}:\d{2}:\d{2}\.\d{3})/g, '$1 line:85% position:50% align:center');
    return vtt;
}

const _subtitleBlobUrls = [];
function _revokeAllSubtitleBlobs() { while (_subtitleBlobUrls.length) URL.revokeObjectURL(_subtitleBlobUrls.pop()); }

async function loadSubtitlesFromGithub(type, id, season, episode) {
    let jsonPath;
    if (type === 'movie') { jsonPath = `${GITHUB_RAW}/sub/movie/${id}/subtitles.json`; }
    else                  { jsonPath = `${GITHUB_RAW}/sub/tv/${id}/${season}/${episode}/subtitles.json`; }
    try {
        const res = await fetch(jsonPath, { cache: 'no-store' });
        if (!res.ok) return;
        const data = await res.json();
        const subs = data.subtitles || {};
        const langs = Object.keys(subs);
        if (!langs.length) return;
        const trackData = await Promise.all(langs.map(async (lang) => {
            try {
                const srtRes = await fetch(subs[lang], { cache: 'no-store' });
                if (!srtRes.ok) return null;
                const srtText = await srtRes.text();
                const vttText = srtToVtt(srtText);
                const blob = new Blob([vttText], { type: 'text/vtt;charset=utf-8' });
                const blobUrl = URL.createObjectURL(blob);
                _subtitleBlobUrls.push(blobUrl);
                return { lang, blobUrl };
            } catch(err) { console.warn(`Failed to load subtitle for ${lang}:`, err.message); return null; }
        }));
        const validTracks = trackData.filter(Boolean);
        if (!validTracks.length) return;
        const inject = () => {
            const allBefore = Array.from(video.textTracks).filter(t => t.kind === 'subtitles' || t.kind === 'captions');
            const showingBefore = allBefore.findIndex(t => t.mode === 'showing');
            Array.from(video.querySelectorAll('track[data-github]')).forEach(t => t.remove());
            validTracks.forEach(({ lang, blobUrl }) => {
                const track = document.createElement('track');
                track.kind = 'subtitles'; track.label = langLabel(lang); track.srclang = lang;
                track.src = blobUrl; track.setAttribute('data-github', '1'); track.default = false;
                video.appendChild(track);
            });
            if (showingBefore !== -1) {
                const allAfter = Array.from(video.textTracks).filter(t => t.kind === 'subtitles' || t.kind === 'captions');
                allAfter.forEach((t, i) => { t.mode = (i === showingBefore) ? 'showing' : 'disabled'; });
            }
            renderTracksMenu();
        };
        if (video.readyState >= 1) inject(); else video.addEventListener('loadedmetadata', inject, { once: true });
    } catch(e) { console.warn('Could not load subtitles.json:', e.message); }
}

/* -------------------------------------------------------------------------
   SUBTITLES FROM WYZIE (OpenSubtitles proxy) — lazy loading
   ------------------------------------------------------------------------- */
const WYZIE_API = 'https://sub.wyzie.io/search';
const WYZIE_KEY = 'wyzie-ea127adc7693d78810f9cf157f267ea0';

async function fetchAndActivateWyzieTrack(trackEl) {
    const lazyUrl = trackEl.getAttribute('data-lazy-url');
    if (!lazyUrl) return true;
    try {
        const srtRes = await fetch(lazyUrl, { cache: 'no-store' });
        if (!srtRes.ok) throw new Error(`HTTP ${srtRes.status}`);
        const srtText = await srtRes.text();
        const vttText = srtToVtt(srtText);
        const blob    = new Blob([vttText], { type: 'text/vtt;charset=utf-8' });
        const blobUrl = URL.createObjectURL(blob);
        _subtitleBlobUrls.push(blobUrl);
        trackEl.src = blobUrl;
        trackEl.removeAttribute('data-lazy-url');
        return true;
    } catch(err) { console.warn('Wyzie lazy fetch failed:', err.message); return false; }
}

async function loadSubtitlesFromWyzie(type, id, season, episode) {
    try {
        let apiUrl = `${WYZIE_API}?id=${id}&key=${WYZIE_KEY}`;
        if (type === 'tv') apiUrl += `&season=${season}&episode=${episode}`;
        const res = await fetch(apiUrl, { cache: 'no-store' });
        if (!res.ok) return;
        const tracks = await res.json();
        if (!Array.isArray(tracks) || !tracks.length) return;
        const inject = () => {
            Array.from(video.querySelectorAll('track[data-wyzie]')).forEach(t => t.remove());
            tracks.forEach((track) => {
                const el = document.createElement('track');
                el.kind    = 'subtitles';
                el.label   = (track.display || track.language) + (track.isHearingImpaired ? ' [CC]' : '');
                el.srclang = track.language;
                el.setAttribute('data-wyzie', '1');
                el.setAttribute('data-lazy-url', track.url);
                el.default = false;
                video.appendChild(el);
            });
            Array.from(video.textTracks).filter(t => t.kind === 'subtitles' || t.kind === 'captions').forEach(t => {
                const el = Array.from(video.querySelectorAll('track[data-wyzie]')).find(el => el.label === t.label && el.srclang === t.language);
                if (el && el.hasAttribute('data-lazy-url')) t.mode = 'disabled';
            });
            renderTracksMenu();
        };
        if (video.readyState >= 1) inject(); else video.addEventListener('loadedmetadata', inject, { once: true });
    } catch(e) { console.warn('Wyzie subtitle load failed:', e.message); }
}

        alert('Failed to report issue. Try again.');
    } finally {
        submitBtn.disabled = issueTypeSelect.value === '';
    }
}
</script>
