<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flixer Pro Max</title>
    
    <link rel="stylesheet" href="https://unpkg.com/artplayer/dist/artplayer.css">
    
    <style>
        :root { --red: #e50914; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }

        /* Force Landscape */
        @media screen and (orientation: portrait) {
            #artplayer {
                transform: rotate(90deg); transform-origin: bottom left;
                width: 100vh; height: 100vw; position: absolute; top: -100vw; left: 0;
            }
        }

        /* Flixer Theme - Red Progress & Hidden Default Context */
        .art-video-player .art-progress-played { background: var(--red) !important; }
        .art-video-player .art-progress-indicator { background: var(--red) !important; }
        .art-video-player .art-state { display: none !important; } /* Hide the big play button for cleaner look */

        /* Loading Screen */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .dot-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader"><div class="dot-spinner"></div><p style="color:white; font-size:10px; margin-top:15px; letter-spacing:2px; font-weight:bold;">BYPASSING ERRORS...</p></div>
    <div id="artplayer"></div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://unpkg.com/artplayer/dist/artplayer.js"></script>

    <script>
        // CONFIG
        const BASE_API = "https://hdhub.thevolecitor.qzz.io/eyJ0b3Jib3giOiJ1bnNldCIsInF1YWxpdGllcyI6IjEwODBwLDcyMHAsNDgwcCIsInNvcnQiOiJkZXNjIn0/stream";
        
        // SLUG FIXER
        const path = window.location.pathname;
        const params = new URLSearchParams(window.location.search);
        
        // Extract IMDB ID (must have tt)
        let imdb = (path.match(/tt\d+/) || [params.get("id")])[0];
        // Robust S/E Extraction
        const segments = path.split('/').filter(x => x && !x.includes('tt') && !isNaN(x));
        let s = segments[0] || params.get("s");
        let e = segments[1] || params.get("e");

        async function startEngine() {
            if (!imdb) return;

            // CORRECT SERIES SLUG FORMAT: tt1234567:1:1
            const targetUrl = (s && e) 
                ? `${BASE_API}/series/${imdb}:${s}:${e}.json` 
                : `${BASE_API}/movie/${imdb}.json`;

            try {
                // Fetch with Proxy to avoid CORS scrap errors
                const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`);
                const data = await res.json();
                
                if (!data.streams || data.streams.length === 0) throw "No Streams";

                const validSources = data.streams.map(st => {
                    let u = st.url;
                    // Auto-fix Pixeldrain
                    if (u.includes("pixeldrain.com/u/")) {
                        u = `https://pixeldrain.com/api/file/${u.split("/u/")[1]}?download`;
                    }
                    return { name: st.name, url: u };
                });

                initArt(validSources);

            } catch (err) {
                console.error("Scrape Error:", err);
                document.getElementById('loader').innerHTML = '<p style="color:var(--red); font-weight:bold;">SOURCE SCRAPE FAILED</p>';
            }
        }

        function initArt(sources) {
            const art = new Artplayer({
                container: '#artplayer',
                url: sources[0].url,
                autoplay: true,
                autoSize: true,
                fullscreen: true,
                setting: true,
                playbackRate: true,
                aspectRatio: true,
                autoOrientation: true,
                pip: true,
                // --- THE "NO ERROR" PLAYBACK ENGINE ---
                type: 'm4v',
                customType: {
                    m4v: function(video, url) {
                        if (Hls.isSupported() && (url.includes('m3u8') || url.includes('castle'))) {
                            const hls = new Hls();
                            hls.loadSource(url);
                            hls.attachMedia(video);
                        } else {
                            // Direct injection for download links / MKV / MP4
                            video.src = url;
                            video.crossOrigin = "anonymous";
                        }
                    }
                },
                settings: [
                    {
                        width: 250,
                        html: 'SERVERS',
                        selector: sources.map(s => ({ html: s.name, url: s.url })),
                        onSelect: function(item) {
                            art.switchUrl(item.url);
                            return item.html;
                        }
                    }
                ],
                controls: [
                    {
                        position: 'right',
                        html: '<span style="font-size:10px; font-weight:bold; background:var(--red); padding:3px 8px; border-radius:3px;">SERVERS</span>',
                        click: function() { art.setting.show = true; }
                    }
                ]
            });

            art.on('ready', () => {
                document.getElementById('loader').style.display = 'none';
                
                // 5x Gain (Boost Audio)
                const actx = new (window.AudioContext || window.webkitAudioContext)();
                const src = actx.createMediaElementSource(art.video);
                const gain = actx.createGain(); gain.gain.value = 5;
                src.connect(gain).connect(actx.destination);
            });

            // Auto-recovery: If a link breaks, switch to next server
            art.on('video:error', () => {
                const curIdx = sources.findIndex(s => s.url === art.url);
                if (curIdx < sources.length - 1) {
                    console.warn("Playback Error. Switching to fallback...");
                    art.switchUrl(sources[curIdx + 1].url);
                }
            });

            window.art = art;
        }

        startEngine();
    </script>
</body>
</html>
