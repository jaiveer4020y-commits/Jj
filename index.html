</head>
<body>

<!-- LOADER -->

<div id="loader">
    <div class="logo">FLIXTER<span> PRO</span></div>
    <div class="spinner"></div>
    <p id="loader-msg">FETCHING SOURCES…</p>
</div>

<!-- ERROR -->

<div id="error-box">
    <div class="err-icon">⚠️</div>
    <h2>PLAYBACK FAILED</h2>
    <p id="error-detail">All servers and proxies exhausted. Try again later or check the URL.</p>
    <button onclick="retryAll()">↺ RETRY</button>
</div>

<!-- PLAYER -->

<div id="artplayer"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script src="https://unpkg.com/artplayer/dist/artplayer.js"></script>

<script>
/* ═══════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════ */
const BASE_API = "https://hdhub.thevolecitor.qzz.io/eyJ0b3Jib3giOiJ1bnNldCIsInF1YWxpdGllcyI6IjEwODBwLDcyMHAsNDgwcCIsInNvcnQiOiJkZXNjIn0/stream";

// Multiple CORS proxies — tried in order until one works
const CORS_PROXIES = [
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://proxy.cors.sh/${url}`,
    url => `https://cors-anywhere.herokuapp.com/${url}`,
];

/* ═══════════════════════════════════════════════
   URL PARSING
═══════════════════════════════════════════════ */
const path   = window.location.pathname;
const params = new URLSearchParams(window.location.search);

let imdb = (path.match(/tt\d+/) || [params.get("id")])[0];
const segs = path.split('/').filter(x => x && !x.match(/tt\d+/) && !isNaN(x));
let s = segs[0] || params.get("s");
let e = segs[1] || params.get("e");

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */
function setMsg(txt) {
    document.getElementById('loader-msg').textContent = txt;
}

function showError(detail) {
    document.getElementById('loader').classList.add('hide');
    document.getElementById('error-detail').textContent = detail || 'Unknown error.';
    document.getElementById('error-box').classList.add('show');
}

function hideLoader() {
    const l = document.getElementById('loader');
    l.classList.add('hide');
    setTimeout(() => l.style.display = 'none', 450);
}

function fixUrl(url) {
    if (!url) return url;
    // Pixeldrain: direct download API
    if (url.includes('pixeldrain.com/u/')) {
        return `https://pixeldrain.com/api/file/${url.split('/u/')[1].split('?')[0]}?download`;
    }
    // Ensure protocol
    if (url.startsWith('//')) return 'https:' + url;
    return url;
}

function isHLS(url) {
    return /\.(m3u8)(\?|$)/i.test(url) || url.includes('manifest') || url.includes('playlist');
}

function isMKV(url) {
    return /\.mkv(\?|$)/i.test(url);
}

/* ═══════════════════════════════════════════════
   CORS PROXY FETCH — tries each proxy in order
═══════════════════════════════════════════════ */
async function fetchWithProxies(targetUrl) {
    let lastErr;
    for (let i = 0; i < CORS_PROXIES.length; i++) {
        const proxied = CORS_PROXIES[i](targetUrl);
        setMsg(`TRYING PROXY ${i + 1}/${CORS_PROXIES.length}…`);
        try {
            const res = await fetch(proxied, { signal: AbortSignal.timeout(8000) });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (data && (data.streams || data.url || data.sources)) return data;
            throw new Error('Empty payload');
        } catch (err) {
            console.warn(`Proxy ${i + 1} failed:`, err.message);
            lastErr = err;
        }
    }
    throw lastErr || new Error('All proxies failed');
}

/* ═══════════════════════════════════════════════
   MAIN ENGINE
═══════════════════════════════════════════════ */
async function startEngine() {
    if (!imdb) {
        showError('No IMDB ID found in URL. Append /tt1234567 or ?id=tt1234567');
        return;
    }

    const targetUrl = (s && e)
        ? `${BASE_API}/series/${imdb}:${parseInt(s)}:${parseInt(e)}.json`
        : `${BASE_API}/movie/${imdb}.json`;

    console.log('Fetching:', targetUrl);

    try {
        setMsg('CONTACTING SERVER…');
        const data = await fetchWithProxies(targetUrl);

        // Normalise stream list — handle different API shapes
        let rawStreams = data.streams || data.sources || (data.url ? [{ name: 'Server 1', url: data.url }] : []);
        if (!Array.isArray(rawStreams) || rawStreams.length === 0) throw new Error('No streams in response');

        const sources = rawStreams
            .filter(st => st && (st.url || st.file))
            .map((st, i) => ({
                name: st.name || st.label || `Server ${i + 1}`,
                url:  fixUrl(st.url || st.file)
            }));

        if (sources.length === 0) throw new Error('All stream URLs were empty');

        setMsg('LAUNCHING PLAYER…');
        initArt(sources);

    } catch (err) {
        console.error('Engine error:', err);
        showError(`Scrape failed: ${err.message}. Check API or try a different ID.`);
    }
}

/* ═══════════════════════════════════════════════
   ARTPLAYER INIT
═══════════════════════════════════════════════ */
function buildCustomType(sources) {
    return {
        // Handles HLS, MKV, MP4, and direct download links
        m4v: function(video, url, art) {
            // Destroy any previous HLS instance
            if (art._hlsInstance) {
                art._hlsInstance.destroy();
                art._hlsInstance = null;
            }

            url = fixUrl(url);
            console.log('Loading URL:', url);

            if (isHLS(url) && Hls.isSupported()) {
                const hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: false,
                    fragLoadingTimeOut: 20000,
                    manifestLoadingTimeOut: 20000,
                    xhrSetup: function(xhr) {
                        xhr.timeout = 15000;
                    }
                });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => {});
                });
                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.warn('HLS network error, recovering…');
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                console.warn('HLS media error, recovering…');
                                hls.recoverMediaError();
                                break;
                            default:
                                console.error('HLS fatal error, triggering fallback');
                                hls.destroy();
                                art.emit('video:error', new Error('HLS fatal'));
                                break;
                        }
                    }
                });
                art._hlsInstance = hls;

            } else if (isHLS(url) && video.canPlayType('application/vnd.apple.mpegurl')) {
                // Safari native HLS
                video.src = url;
                video.play().catch(() => {});

            } else {
                // Direct MP4 / MKV / download link
                video.src = url;
                video.crossOrigin = 'anonymous';
                // For MKV on browsers that don't support it, we can't do much
                // but set the src and let the browser try
                if (isMKV(url)) {
                    console.warn('MKV detected — browser support varies. Chrome recommended.');
                }
                video.load();
                video.play().catch(() => {});
            }
        }
    };
}

function initArt(sources) {
    const art = new Artplayer({
        container: '#artplayer',
        url: sources[0].url,
        type: 'm4v',
        autoplay: true,
        autoSize: true,
        fullscreen: true,
        fullscreenWeb: true,
        setting: true,
        playbackRate: true,
        aspectRatio: true,
        autoOrientation: true,
        pip: true,
        volume: 1,
        muted: false,
        hotkey: true,
        screenshot: false,

        customType: buildCustomType(sources),

        // Server switcher in settings panel
        settings: [
            {
                width: 260,
                html: '📡 &nbsp;SERVERS',
                selector: sources.map((s, i) => ({
                    html: `<span style="font-size:11px">${s.name}</span>`,
                    url: s.url,
                    default: i === 0
                })),
                onSelect: function(item) {
                    switchToUrl(art, item.url);
                    return item.html;
                }
            }
        ],

        controls: [
            {
                position: 'right',
                html: '<span style="font-size:10px;font-weight:700;background:var(--red);padding:3px 10px;border-radius:3px;letter-spacing:1px">SERVERS</span>',
                click: function() { art.setting.show = !art.setting.show; }
            }
        ]
    });

    // Player ready
    art.on('ready', () => {
        hideLoader();
        boostAudio(art);
        console.log('Player ready ✓');
    });

    // Auto-fallback on error
    let lastAutoSwitch = 0;
    art.on('video:error', () => {
        const now = Date.now();
        if (now - lastAutoSwitch < 2000) return; // debounce
        lastAutoSwitch = now;

        const curIdx = sources.findIndex(s => s.url === art.url);
        const nextIdx = curIdx + 1;

        if (nextIdx < sources.length) {
            console.warn(`Server ${curIdx + 1} failed → trying server ${nextIdx + 1}`);
            setMsg(`SERVER ${curIdx + 1} FAILED, TRYING ${nextIdx + 1}…`);
            setTimeout(() => switchToUrl(art, sources[nextIdx].url), 800);
        } else {
            showError('All servers failed. The content may be offline or geo-blocked.');
        }
    });

    window.art = art;
}

/* ═══════════════════════════════════════════════
   SWITCH URL (works for both HLS & direct)
═══════════════════════════════════════════════ */
function switchToUrl(art, url) {
    url = fixUrl(url);
    art.url = url; // triggers customType handler via artplayer
    // Artplayer switchUrl also triggers type handler:
    art.switchUrl(url, 'm4v');
}

/* ═══════════════════════════════════════════════
   AUDIO BOOST (5× gain)
═══════════════════════════════════════════════ */
function boostAudio(art) {
    try {
        const ctx  = new (window.AudioContext || window.webkitAudioContext)();
        const src  = ctx.createMediaElementSource(art.video);
        const gain = ctx.createGain();
        gain.gain.value = 5;
        src.connect(gain);
        gain.connect(ctx.destination);
    } catch(e) {
        console.warn('AudioContext boost failed (harmless):', e.message);
    }
}

/* ═══════════════════════════════════════════════
   RETRY BUTTON
═══════════════════════════════════════════════ */
function retryAll() {
    document.getElementById('error-box').classList.remove('show');
    document.getElementById('loader').classList.remove('hide');
    document.getElementById('loader').style.display = '';
    startEngine();
}

/* ═══════════════════════════════════════════════
   KICK OFF
═══════════════════════════════════════════════ */
startEngine();
</script>

</body>
</html>
