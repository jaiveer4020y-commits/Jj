<html lang="en">
<head>

    <link rel="stylesheet" href="https://unpkg.com/artplayer/dist/artplayer.css">
    <style>
        :root { --red: #e50914; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }

</head>
<body>

<div id="loader">
    <div class="dot-spinner"></div>
    <p style="color:white; font-size:10px; margin-top:15px; letter-spacing:2px; font-weight:bold;" id="loader-msg">FETCHING SOURCES...</p>
</div>
<div id="artplayer"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script src="https://unpkg.com/artplayer/dist/artplayer.js"></script>

<script>
const BASE_API = "https://hdhub.thevolecitor.qzz.io/eyJ0b3Jib3giOiJ1bnNldCIsInF1YWxpdGllcyI6IjEwODBwLDcyMHAsNDgwcCIsInNvcnQiOiJkZXNjIn0/stream";

const path = window.location.pathname;
const params = new URLSearchParams(window.location.search);
let imdb = (path.match(/tt\d+/) || [params.get("id")])[0];
const segs = path.split('/').filter(x => x && !x.match(/tt\d+/) && !isNaN(x));
let s = segs[0] || params.get("s");
let e = segs[1] || params.get("e");

// ── URL FIXER ──────────────────────────────────────────────
function fixUrl(url) {
    if (!url) return url;

    // Pixeldrain: /api/file/{id} WITHOUT ?download = streaming endpoint
    // ?download forces browser to download the file instead of playing it
    if (url.includes('pixeldrain.com/u/')) {
        const id = url.split('/u/')[1].split('?')[0].split('/')[0];
        return 'https://pixeldrain.com/api/file/' + id;
    }

    if (url.startsWith('//')) return 'https:' + url;
    return url;
}

function isHLS(url) {
    return /\.m3u8/i.test(url) || url.includes('castle');
}

// ── FETCH API ──────────────────────────────────────────────
async function startEngine() {
    if (!imdb) {
        document.getElementById('loader').innerHTML = '<p style="color:var(--red);font-weight:bold;">NO IMDB ID IN URL</p>';
        return;
    }

    const targetUrl = (s && e)
        ? BASE_API + '/series/' + imdb + ':' + parseInt(s) + ':' + parseInt(e) + '.json'
        : BASE_API + '/movie/' + imdb + '.json';

    try {
        document.getElementById('loader-msg').textContent = 'CONTACTING SERVER...';
        const res = await fetch(targetUrl);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        if (!data.streams || data.streams.length === 0) throw new Error('No streams');

        const sources = data.streams.map(function(st) {
            return { name: st.name, url: fixUrl(st.url) };
        });

        initArt(sources);

    } catch (err) {
        console.error('Scrape Error:', err);
        document.getElementById('loader').innerHTML = '<p style="color:var(--red);font-weight:bold;">SOURCE SCRAPE FAILED<br><span style="font-size:10px;color:#888">' + err.message + '</span></p>';
    }
}

// ── PLAYER ─────────────────────────────────────────────────
function initArt(sources) {
    var hlsInstance = null;

    var art = new Artplayer({
        container: '#artplayer',
        url: sources[0].url,
        type: 'm4v',
        autoplay: true,
        autoSize: true,
        fullscreen: true,
        setting: true,
        playbackRate: true,
        aspectRatio: true,
        autoOrientation: true,
        pip: true,

        customType: {
            m4v: function(video, url) {
                if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

                url = fixUrl(url);

                if (isHLS(url)) {
                    if (Hls.isSupported()) {
                        hlsInstance = new Hls({ enableWorker: true });
                        hlsInstance.loadSource(url);
                        hlsInstance.attachMedia(video);
                        hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
                        hlsInstance.on(Hls.Events.ERROR, function(_, data) {
                            if (data.fatal) {
                                if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hlsInstance.recoverMediaError();
                                else { hlsInstance.destroy(); hlsInstance = null; art.emit('video:error'); }
                            }
                        });
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = url;
                        video.play();
                    }
                } else {
                    // Direct MP4 / MKV / Pixeldrain
                    video.crossOrigin = 'anonymous';
                    video.src = url;
                    video.load();
                    // Muted autoplay is always allowed, then unmute immediately
                    video.muted = true;
                    video.play().then(function() {
                        video.muted = false;
                    }).catch(function(e) { console.warn('Autoplay failed:', e); });
                }
            }
        },

        settings: [
            {
                width: 250,
                html: 'SERVERS',
                selector: sources.map(function(s, i) {
                    return { html: s.name, url: s.url, default: i === 0 };
                }),
                onSelect: function(item) {
                    art.switchUrl(fixUrl(item.url), 'm4v');
                    return item.html;
                }
            }
        ],

        controls: [
            {
                position: 'right',
                html: '<span style="font-size:10px;font-weight:bold;background:var(--red);padding:3px 8px;border-radius:3px;">SERVERS</span>',
                click: function() { art.setting.show = !art.setting.show; }
            }
        ]
    });

    art.on('ready', function() {
        document.getElementById('loader').style.display = 'none';
        try {
            var ctx = new (window.AudioContext || window.webkitAudioContext)();
            var src = ctx.createMediaElementSource(art.video);
            var gain = ctx.createGain();
            gain.gain.value = 5;
            src.connect(gain).connect(ctx.destination);
        } catch(e) { console.warn('AudioContext:', e.message); }
    });

    var switching = false;
    art.on('video:error', function() {
        if (switching) return;
        switching = true;
        var curIdx = sources.findIndex(function(src) { return fixUrl(src.url) === fixUrl(art.url); });
        var next = curIdx + 1;
        if (next < sources.length) {
            console.warn('Server ' + (curIdx+1) + ' failed, trying ' + (next+1));
            setTimeout(function() {
                switching = false;
                art.switchUrl(fixUrl(sources[next].url), 'm4v');
            }, 500);
        } else {
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('loader').innerHTML = '<p style="color:var(--red);font-weight:bold;">ALL SERVERS FAILED</p>';
        }
    });

    window.art = art;
}

startEngine();
</script>

</body>
</html>
