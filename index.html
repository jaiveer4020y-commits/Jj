<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flixer Pro - Cloud Player</title>
    
    <link rel="stylesheet" href="https://unpkg.com/artplayer/dist/artplayer.css">
    
    <style>
        :root { --accent: #ff0000; --bg: #000000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; }

        /* LANDSCAPE OVERLAY */
        #rotate-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .rotate-gif { width: 80px; height: 80px; border: 4px solid #fff; border-radius: 10px; animation: rotate 2s infinite; }
        @keyframes rotate { 0% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } 100% { transform: rotate(0deg); } }
        @media screen and (orientation: portrait) { #rotate-overlay { display: flex; } }

        /* FLIXER UI OVERRIDES */
        #player { width: 100vw; height: 100vh; }
        
        /* Custom Loader */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #poster { width: 150px; height: 220px; border-radius: 10px; margin-bottom: 20px; animation: pulse 1.5s infinite; object-fit: cover; border: 1px solid #333; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* Vertical Side Menu (Flixer Style) */
        .art-controls-left { flex-direction: column !important; position: absolute; left: 20px; top: 50%; transform: translateY(-50%); gap: 30px; }
    </style>
</head>
<body>

    <div id="rotate-overlay">
        <div class="rotate-gif"></div>
        <p style="margin-top:20px; font-weight:bold; letter-spacing:1px;">PLEASE ROTATE YOUR DEVICE</p>
    </div>

    <div id="loader">
        <img id="poster" src="" alt="">
        <div id="load-text" style="font-size:12px; color:#888;">INITIALIZING SECURE STREAM...</div>
    </div>

    <div id="player"></div>

    <script src="https://unpkg.com/artplayer/dist/artplayer.js"></script>

    <script>
        const TMDB_KEY = "81f645c3d9ced06a366b0d829d844cfe";
        const API_URL = "https://hdhub.thevolecitor.qzz.io/eyJ0b3Jib3giOiJ1bnNldCIsInF1YWxpdGllcyI6IjEwODBwLDcyMHAiLCJzb3J0IjoiZGVzYyJ9/stream";

        const path = window.location.pathname;
        const id = (path.match(/tt\d+/) || [new URLSearchParams(location.search).get("id")])[0];
        const segments = path.split('/').filter(s => s && !s.includes('tt') && !isNaN(s));
        const s = segments[0] || 1;
        const e = segments[1] || 1;
        const isSeries = path.includes('tt') && segments.length >= 2;

        async function boot() {
            if (!id) return;

            // 1. Get Metadata
            fetch(`https://api.themoviedb.org/3/find/${id}?api_key=${TMDB_KEY}&external_source=imdb_id`)
                .then(r => r.json()).then(data => {
                    const item = data.movie_results[0] || data.tv_results[0];
                    if (item) document.getElementById("poster").src = `https://image.tmdb.org/t/p/w500${item.poster_path}`;
                });

            // 2. Fetch Streams
            const target = isSeries ? `${API_URL}/series/${id}:${s}:${e}.json` : `${API_URL}/movie/${id}.json`;
            
            try {
                const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(target)}`);
                const data = await res.json();
                
                const streams = (data.streams || []).map(st => {
                    let url = st.url;
                    const name = st.name.toLowerCase();
                    
                    // DIRECT STREAM MECHANISM
                    // Pixeldrain Fix
                    if (name.includes("pixeldrain")) {
                        const pid = url.split("/u/")[1] || url.split("/").pop();
                        url = `https://pixeldrain.com/api/file/${pid}?download`;
                    }
                    
                    // General Download/Castle Fix: Force HTTPS & Direct Headers
                    if (url.startsWith("http://")) url = url.replace("http://", "https://");

                    return { name: st.name, url: url };
                });

                if (streams.length) startPlayer(streams);
                else throw "No Streams";

            } catch (e) {
                document.getElementById("load-text").innerText = "STREAM NOT FOUND";
                document.getElementById("load-text").style.color = "red";
            }
        }

        function startPlayer(list) {
            const art = new Artplayer({
                container: "#player",
                url: list[0].url,
                autoplay: true,
                autoSize: true,
                fullscreen: true,
                setting: true,
                playbackRate: true,
                aspectRatio: true,
                pip: true,
                theme: '#ff0000',
                // FLIXER UI ADJUSTMENTS
                controls: [
                    {
                        position: 'left',
                        index: 10,
                        html: '<div style="display:flex; flex-direction:column; align-items:center;"><img src="https://cdn-icons-png.flaticon.com/512/10307/10307901.png" width="22"><span style="font-size:10px;">Servers</span></div>',
                        click: function() { art.setting.show = true; }
                    },
                    {
                        position: 'left',
                        index: 11,
                        html: '<div style="display:flex; flex-direction:column; align-items:center;"><img src="https://cdn-icons-png.flaticon.com/512/2562/2562541.png" width="22"><span style="font-size:10px;">Subtitles</span></div>',
                    }
                ],
                settings: [
                    {
                        html: 'SERVER LIST',
                        selector: list.map(item => ({
                            html: item.name,
                            url: item.url,
                        })),
                        onSelect: function(item) {
                            art.switchUrl(item.url);
                            return item.html;
                        }
                    }
                ],
                // THE "STREMIO/VLC" ENGINE FIX
                // This tells the browser: "Don't ask, just play this as video"
                customType: {
                    m4v: function(video, url) {
                        video.src = url;
                    }
                },
                type: 'm4v'
            });

            art.on('ready', () => {
                // Hide Loader
                document.getElementById("loader").style.opacity = "0";
                setTimeout(() => document.getElementById("loader").style.display = "none", 500);
                
                // Audio Boost (5x)
                const actx = new (window.AudioContext || window.webkitAudioContext)();
                const src = actx.createMediaElementSource(art.video);
                const gain = actx.createGain();
                gain.gain.value = 5;
                src.connect(gain).connect(actx.destination);
            });

            // Auto-Switch on Error
            art.on('video:error', () => {
                const current = list.findIndex(s => s.url === art.url);
                if (current < list.length - 1) {
                    art.switchUrl(list[current + 1].url);
                }
            });

            window.art = art;
        }

        boot();
    </script>
</body>
</html>
