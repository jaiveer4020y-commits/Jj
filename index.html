<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Player Fix</title>
    <link rel="stylesheet" href="https://unpkg.com/artplayer/dist/artplayer.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #player { width: 100vw; height: 100vh; }
        #loading {
            position: fixed; inset: 0; background: #000; z-index: 99;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #poster { width: 160px; height: 240px; border-radius: 10px; border: 2px solid #333; margin-bottom: 15px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        #sources-ui {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; background: #111; border: 1px solid #444; border-radius: 10px;
            display: none; z-index: 100; color: white; padding: 10px;
        }
        .src-btn { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; text-align: center; }
        .src-btn:hover { background: #333; }
    </style>
</head>
<body>

<div id="loading">
    <img id="poster" src="">
    <div id="status" style="color:white; font-family:sans-serif;">Searching Streams...</div>
</div>

<div id="player"></div>
<div id="sources-ui"></div>

<script src="https://unpkg.com/artplayer/dist/artplayer.js"></script>

<script>
const TMDB_KEY = "81f645c3d9ced06a366b0d829d844cfe";
const BASE_API = "https://hdhub.thevolecitor.qzz.io/eyJ0b3Jib3giOiJ1bnNldCIsInF1YWxpdGllcyI6IjEwODBwLDcyMHAiLCJzb3J0IjoiZGVzYyJ9/stream";

// Better Detection Logic
const parts = window.location.pathname.split('/').filter(p => p);
const params = new URLSearchParams(location.search);

const id = parts[0] || params.get("id");
const s = parts[1] || params.get("s");
const e = parts[2] || params.get("e");
const isSeries = !!(s && e);

async function init() {
    if (!id) {
        document.getElementById("status").innerText = "Error: No ID found";
        return;
    }

    // 1. Load Poster
    fetch(`https://api.themoviedb.org/3/find/${id}?api_key=${TMDB_KEY}&external_source=imdb_id`)
        .then(r => r.json()).then(data => {
            const item = data.movie_results[0] || data.tv_results[0];
            if (item) document.getElementById("poster").src = `https://image.tmdb.org/t/p/w500${item.poster_path}`;
        });

    // 2. Fetch Streams
    const endpoint = isSeries ? `${BASE_API}/series/${id}:${s}:${e}.json` : `${BASE_API}/movie/${id}.json`;
    
    try {
        // Use a more reliable proxy if AllOrigins is failing in Chrome
        const proxy = "https://api.allorigins.win/raw?url=";
        const res = await fetch(proxy + encodeURIComponent(endpoint));
        const data = await res.json();
        
        const streams = (data.streams || []).map(st => {
            let url = st.url;
            if (st.name.toLowerCase().includes("pixeldrain")) {
                url = `https://pixeldrain.com/api/file/${url.split("/u/")[1]}?download`;
            }
            return { name: st.name, url: url };
        }).filter(st => /fsl|pixeldrain|castle/i.test(st.name));

        if (!streams.length) throw "No streams";

        startPlayer(streams);
    } catch (e) {
        document.getElementById("status").innerText = "No streams available for this title.";
    }
}

function startPlayer(list) {
    const art = new Artplayer({
        container: "#player",
        url: list[0].url,
        autoplay: true,
        fullscreen: true,
        setting: true, // This enables the built-in settings menu
        settings: [
            {
                html: 'Switch Source',
                selector: list.map(s => ({
                    html: s.name,
                    url: s.url,
                    default: s === list[0]
                })),
                onSelect: (item) => {
                    art.switchUrl(item.url);
                    return item.html;
                }
            }
        ]
    });

    // Audio Boost Logic for Chrome
    art.on('ready', () => {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaElementSource(art.video);
        const gain = audioCtx.createGain();
        gain.gain.value = 4;
        source.connect(gain).connect(audioCtx.destination);
        
        document.getElementById("loading").style.display = "none";
    });

    window.art = art;
}

init();
</script>
</body>
</html>
