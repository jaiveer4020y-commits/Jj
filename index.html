<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Player</title>

<link rel="stylesheet" href="https://unpkg.com/artplayer/dist/artplayer.css">

<style>
/* Videasy Inspired Dark Theme */
body { margin:0; background:#050505; color:#fff; font-family: 'Inter', sans-serif; overflow: hidden; }

#player { width:100vw; height:100vh; }

/* Pulse Loading Screen */
#loading {
  position:fixed;
  inset:0;
  background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:100;
  transition: opacity 0.5s ease;
}

.loader-content { text-align: center; }

#poster {
  width: 180px;
  height: 270px;
  object-fit: cover;
  border-radius: 15px;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
  margin-bottom: 20px;
  border: 1px solid #333;
  animation: pulse 2s infinite ease-in-out;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 10px rgba(255,255,255,0.1); }
  50% { transform: scale(1.03); opacity: 1; box-shadow: 0 0 30px rgba(255,255,255,0.2); }
  100% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 10px rgba(255,255,255,0.1); }
}

#title { font-weight: bold; font-size: 1.2rem; letter-spacing: 1px; color: #eee; }

/* Source Menu */
#sources {
  position:fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 90%; max-width: 400px;
  background: rgba(20, 20, 20, 0.95);
  backdrop-filter: blur(10px);
  border-radius: 12px;
  border: 1px solid #444;
  display:none;
  z-index: 200;
}

.source {
  padding: 15px;
  border-bottom: 1px solid #333;
  cursor: pointer;
  text-align: center;
  transition: background 0.3s;
}
.source:hover { background: #333; }
.source:last-child { border: none; }

#error {
  position:fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  background: rgba(255, 0, 0, 0.8);
  padding: 10px 20px;
  border-radius: 5px;
  display: none;
  z-index: 300;
}
</style>
</head>
<body>

<div id="loading">
  <div class="loader-content">
    <img id="poster" src="https://via.placeholder.com/180x270?text=Loading...">
    <div id="title">PREPARING STREAM</div>
  </div>
</div>

<div id="player"></div>
<div id="sources"></div>
<div id="error"></div>

<script src="https://unpkg.com/artplayer/dist/artplayer.js"></script>

<script>
// ===== CONFIG =====
const TMDB_KEY = "81f645c3d9ced06a366b0d829d844cfe";
const BASE_API = "https://hdhub.thevolecitor.qzz.io/eyJ0b3Jib3giOiJ1bnNldCIsInF1YWxpdGllcyI6IjEwODBwLDcyMHAiLCJzb3J0IjoiZGVzYyJ9/stream";

// ===== PARAMS & DETECTION =====
const q = new URLSearchParams(location.search);
const id = q.get("id"); // e.g. tt12345
const s = q.get("s");
const e = q.get("e");

// Detection Logic: If 's' exists, it's a series.
const isSeries = !!s;

// ===== BUILD ENDPOINT =====
function buildUrl() {
  if (isSeries) {
    // Endpoint: /series/id:s:e.json
    return `${BASE_API}/series/${id}:${s}:${e}.json`;
  } else {
    // Endpoint: /movie/id.json (Updated as requested)
    return `${BASE_API}/movie/${id}.json`;
  }
}

async function fetchJSON(url) {
  try {
    const res = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(url));
    if (!res.ok) throw "Network error";
    return await res.json();
  } catch (err) {
    document.getElementById("error").innerText = "Failed to fetch stream. Check console.";
    document.getElementById("error").style.display = "block";
    console.error(err);
  }
}

async function loadTMDB() {
  try {
    const type = isSeries ? 'tv' : 'movie';
    const res = await fetch(`https://api.themoviedb.org/3/find/${id}?api_key=${TMDB_KEY}&external_source=imdb_id`);
    const data = await res.json();
    const item = data.movie_results[0] || data.tv_results[0];

    if (item) {
      document.getElementById("poster").src = `https://image.tmdb.org/t/p/w500${item.poster_path}`;
      document.getElementById("title").innerText = (item.title || item.name).toUpperCase();
    }
  } catch (e) { console.log("TMDB Load Fail"); }
}

function parseStreams(data) {
  if (!data || !data.streams) return [];
  // Filtering for specific providers as per your original code
  return data.streams.filter(st => {
    const n = st.name.toLowerCase();
    return n.includes("fsl") || n.includes("pixeldrain") || n.includes("castle");
  }).map(st => {
    if (st.name.toLowerCase().includes("pixeldrain") && st.url.includes("/u/")) {
        st.url = `https://pixeldrain.com/api/file/${st.url.split("/u/")[1]}?download`;
    }
    return st;
  });
}

function createPlayer(url) {
  const art = new Artplayer({
    container: "#player",
    url: url,
    autoplay: true,
    fullscreen: true,
    setting: true,
    pip: true,
    controls: [
        {
            position: 'right',
            html: 'SOURCES',
            click: () => {
                const box = document.getElementById("sources");
                box.style.display = box.style.display === "block" ? "none" : "block";
            }
        }
    ]
  });

  // Audio Boost
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaElementSource(art.video);
  const gainNode = audioCtx.createGain();
  gainNode.gain.value = 2.5; 
  source.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  window.art = art;
}

(async () => {
  if (!id) return alert("No ID provided");
  
  await loadTMDB();
  const data = await fetchJSON(buildUrl());
  const streams = parseStreams(data);

  if (streams.length > 0) {
    const best = streams.find(st => st.name.includes("1080")) || streams[0];
    
    // UI Source List
    const box = document.getElementById("sources");
    streams.forEach(st => {
        const d = document.createElement("div");
        d.className = "source";
        d.innerText = st.name;
        d.onclick = () => {
            art.switchUrl(st.url);
            box.style.display = "none";
        };
        box.appendChild(d);
    });

    createPlayer(best.url);
    
    // Hide loader after a small delay for smooth feel
    setTimeout(() => {
        document.getElementById("loading").style.opacity = "0";
        setTimeout(() => document.getElementById("loading").style.display = "none", 500);
    }, 1000);

  } else {
    document.getElementById("title").innerText = "NO STREAMS FOUND";
  }
})();
</script>
</body>
</html>
