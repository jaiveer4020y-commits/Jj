<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Player Pro v6</title>
    <link rel="stylesheet" href="https://unpkg.com/artplayer/dist/artplayer.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #player { width: 100vw; height: 100vh; background: #000; }
        
        /* Videasy Style Loader */
        #loader {
            position: fixed; inset: 0; background: radial-gradient(circle, #151515 0%, #000 100%);
            z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        #poster { 
            width: 180px; height: 270px; border-radius: 12px; border: 1px solid #333; 
            margin-bottom: 20px; animation: pulse 2s infinite ease-in-out; object-fit: cover;
            background: #222;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.02); opacity: 1; } 100% { transform: scale(1); opacity: 0.6; } }
        #status { font-size: 14px; color: #888; letter-spacing: 2px; text-transform: uppercase; }

        /* Error Message */
        #error-display {
            position: fixed; top: 20%; width: 80%; left: 10%; background: rgba(255,0,0,0.1);
            border: 1px solid #ff4444; padding: 20px; border-radius: 10px; color: #ff4444;
            display: none; z-index: 1000; text-align: center;
        }
    </style>
</head>
<body>

<div id="error-display">
    <strong style="display:block; margin-bottom:10px;">CONNECTION ERROR</strong>
    <div id="error-text">No response from stream server.</div>
    <button onclick="location.reload()" style="margin-top:15px; background:#ff4444; color:#fff; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">RETRY</button>
</div>

<div id="loader">
    <img id="poster" src="" alt="">
    <div id="status">INITIALIZING...</div>
</div>

<div id="player"></div>

<script src="https://unpkg.com/artplayer/dist/artplayer.js"></script>

<script>
// --- CONFIG ---
const TMDB_KEY = "81f645c3d9ced06a366b0d829d844cfe";
const BASE_API = "https://hdhub.thevolecitor.qzz.io/eyJ0b3Jib3giOiJ1bnNldCIsInF1YWxpdGllcyI6IjEwODBwLDcyMHAiLCJzb3J0IjoiZGVzYyJ9/stream";

// --- DETECTION LOGIC ---
const path = window.location.pathname;
const search = new URLSearchParams(window.location.search);

// 1. Find ID (ttxxxx)
const id = (path.match(/tt\d+/) || [search.get("id")])[0];

// 2. Find S and E (Look for numbers in path that aren't the ID)
const pathSegments = path.split('/').filter(s => s && !s.includes('tt') && !isNaN(s));
const s = pathSegments[0] || search.get("s");
const e = pathSegments[1] || search.get("e");

const isSeries = !!(s && e);

// --- UI CONTROLS ---
const setStatus = (msg) => document.getElementById("status").innerText = msg;
const hideLoader = () => {
    document.getElementById("loader").style.opacity = "0";
    setTimeout(() => document.getElementById("loader").style.display = "none", 500);
};
const showError = (msg) => {
    document.getElementById("error-text").innerText = msg;
    document.getElementById("error-display").style.display = "block";
    hideLoader();
};

async function main() {
    if (!id) {
        showError("ID NOT FOUND. URL should be /tt1234567");
        return;
    }

    // 1. Get TMDB Poster
    fetch(`https://api.themoviedb.org/3/find/${id}?api_key=${TMDB_KEY}&external_source=imdb_id`)
        .then(r => r.json()).then(data => {
            const item = data.movie_results[0] || data.tv_results[0];
            if (item) {
                document.getElementById("poster").src = `https://image.tmdb.org/t/p/w500${item.poster_path}`;
                setStatus(item.title || item.name);
            }
        }).catch(() => setStatus("STREAMING CONTENT"));

    // 2. Build Correct API URL
    const apiUrl = isSeries 
        ? `${BASE_API}/series/${id}:${s}:${e}.json` 
        : `${BASE_API}/movie/${id}.json`;

    console.log("Fetching from:", apiUrl);

    // 3. Fetch Streams with Proxy
    try {
        const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(apiUrl);
        const response = await fetch(proxyUrl);
        
        if (!response.ok) throw new Error("Server response was not OK");
        
        const data = await response.json();
        const streams = (data.streams || []).map(st => {
            let streamUrl = st.url;
            if (st.name.toLowerCase().includes("pixeldrain") && streamUrl.includes("/u/")) {
                streamUrl = `https://pixeldrain.com/api/file/${streamUrl.split("/u/")[1]}?download`;
            }
            return { name: st.name, url: streamUrl };
        });

        if (streams.length === 0) throw new Error("No streams available in API");

        initPlayer(streams);

    } catch (err) {
        console.error(err);
        showError("FAIL: " + err.message);
    }
}

function initPlayer(list) {
    const art = new Artplayer({
        container: "#player",
        url: list[0].url,
        autoplay: true,
        fullscreen: true,
        setting: true,
        settings: [
            {
                html: 'Sources',
                selector: list.map(item => ({
                    html: item.name,
                    url: item.url,
                })),
                onSelect: function(item) {
                    art.switchUrl(item.url);
                    return item.html;
                }
            }
        ]
    });

    art.on('ready', () => {
        // Audio Boost 5x
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        const src = actx.createMediaElementSource(art.video);
        const gain = actx.createGain();
        gain.gain.value = 5;
        src.connect(gain).connect(actx.destination);
        
        hideLoader();
    });

    // Auto-hide loader if 'ready' event is missed
    setTimeout(hideLoader, 6000);
}

// Fail-safe: If nothing happens in 12 seconds, hide loader
setTimeout(() => {
    if (document.getElementById("loader").style.display !== "none") {
        setStatus("LOADING TIMEOUT - CLICK TO CLOSE");
        document.getElementById("loader").onclick = hideLoader;
    }
}, 12000);

main();
</script>
</body>
</html>
