<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Responsive Player</title>
    
    <link rel="stylesheet" href="https://unpkg.com/artplayer/dist/artplayer.css">
    
    <style>
        :root { --accent: #3498db; --error: #e74c3c; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }

        /* --- LANDSCAPE ENFORCEMENT --- */
        #rotate-notice {
            position: fixed; inset: 0; background: #0b0b0b; z-index: 10000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        
        .phone-icon {
            width: 50px; height: 90px; border: 3px solid #fff; border-radius: 8px;
            position: relative; animation: rotatePhone 2s infinite ease-in-out; margin-bottom: 20px;
        }
        .phone-icon::after { content: ''; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); width: 8px; height: 8px; border: 2px solid #fff; border-radius: 50%; }

        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }

        @media screen and (orientation: portrait) {
            #rotate-notice { display: flex; }
        }

        /* --- VIDEASY LOADER & OVERLAYS --- */
        #loader {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        
        #poster { 
            width: 40vw; max-width: 200px; aspect-ratio: 2/3; border-radius: 12px; 
            border: 1px solid #333; margin-bottom: 20px; object-fit: cover;
            box-shadow: 0 0 30px rgba(0,0,0,0.5); background: #222;
        }

        #status { font-size: 12px; letter-spacing: 2px; color: var(--accent); font-weight: bold; text-transform: uppercase; }

        #error-ui {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 400px; background: #1a1a1a; border: 1px solid var(--error);
            padding: 20px; border-radius: 15px; text-align: center; display: none; z-index: 1001;
        }

        /* --- PLAYER AREA --- */
        #player { width: 100%; height: 100%; }

        /* Mobile Adjustments for Artplayer */
        .art-video-player { font-size: 14px; }
    </style>
</head>
<body>

    <div id="rotate-notice">
        <div class="phone-icon"></div>
        <h2 style="font-size: 1.2rem;">ROTATE FOR CINEMA MODE</h2>
    </div>

    <div id="loader">
        <img id="poster" src="" alt="">
        <div id="status">Linking to Server...</div>
    </div>

    <div id="error-ui">
        <h3 style="color:var(--error); margin-top:0;">STREAM UNAVAILABLE</h3>
        <p id="error-desc" style="font-size: 0.9rem; color:#ccc;">Could not find a working stream for this ID.</p>
        <button onclick="location.reload()" style="background:var(--accent); color:white; border:none; padding:10px 20px; border-radius:8px; width:100%;">RETRY CONNECTION</button>
    </div>

    <div id="player"></div>

    <script src="https://unpkg.com/artplayer/dist/artplayer.js"></script>

    <script>
        // --- 1. CONFIG ---
        const TMDB_KEY = "81f645c3d9ced06a366b0d829d844cfe";
        const API_BASE = "https://hdhub.thevolecitor.qzz.io/eyJ0b3Jib3giOiJ1bnNldCIsInF1YWxpdGllcyI6IjEwODBwLDcyMHAiLCJzb3J0IjoiZGVzYyJ9/stream";

        // --- 2. IMPROVED DETECTION ---
        const getMediaData = () => {
            const path = window.location.pathname;
            const params = new URLSearchParams(window.location.search);
            
            // Look for tt ID anywhere in URL
            const id = (path.match(/tt\d+/) || [params.get("id")])[0];
            
            // Grab numbers for S/E
            const segments = path.split('/').filter(s => s && !s.includes('tt') && !isNaN(s));
            const s = segments[0] || params.get("s");
            const e = segments[1] || params.get("e");

            return { id, s, e, isSeries: !!(s && e) };
        };

        const { id, s, e, isSeries } = getMediaData();

        // --- 3. UI HELPERS ---
        const hideLoader = () => {
            const l = document.getElementById("loader");
            l.style.opacity = "0";
            setTimeout(() => l.style.display = "none", 500);
        };

        // --- 4. ENGINE ---
        async function start() {
            if (!id) {
                document.getElementById("status").innerText = "URL ERROR: MISSING ID";
                // Fail-safe: show empty player so settings might still be reachable
                initPlayer([{name: "Manual Input Needed", url: ""}]);
                return;
            }

            // Fetch Metadata (Poster)
            fetch(`https://api.themoviedb.org/3/find/${id}?api_key=${TMDB_KEY}&external_source=imdb_id`)
                .then(r => r.json()).then(data => {
                    const item = data.movie_results[0] || data.tv_results[0];
                    if (item) {
                        document.getElementById("poster").src = `https://image.tmdb.org/t/p/w500${item.poster_path}`;
                        document.getElementById("status").innerText = (item.title || item.name);
                    }
                });

            // Build API URL
            const target = isSeries ? `${API_BASE}/series/${id}:${s}:${e}.json` : `${API_BASE}/movie/${id}.json`;

            try {
                // Using a fallback proxy mechanism
                const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(target)}`);
                if (!res.ok) throw "API unreachable";
                const data = await res.json();
                
                const streams = (data.streams || []).map(st => {
                    let u = st.url;
                    if (st.name.toLowerCase().includes("pixeldrain")) {
                        const pid = u.split("/u/")[1] || u.split("/").pop();
                        u = `https://pixeldrain.com/api/file/${pid}?download`;
                    }
                    return { name: st.name, url: u };
                });

                if (!streams.length) throw "No streams found";
                initPlayer(streams);

            } catch (err) {
                console.error(err);
                document.getElementById("error-ui").style.display = "block";
                hideLoader();
            }
        }

        function initPlayer(list) {
            const art = new Artplayer({
                container: "#player",
                url: list[0].url,
                autoplay: true,
                fullscreen: true,
                setting: true,
                pip: true,
                playbackRate: true,
                aspectRatio: true,
                autoOrientation: true, // Internal Artplayer landscape trigger
                settings: [
                    {
                        width: 200,
                        html: 'SERVER SELECT',
                        selector: list.map(item => ({
                            html: item.name,
                            url: item.url,
                            default: item === list[0]
                        })),
                        onSelect: function(item) {
                            art.switchUrl(item.url);
                            return item.html;
                        }
                    }
                ],
                // High compatibility mode for VLC-style links
                customType: {
                    m4v: (video, url) => video.src = url,
                },
                type: 'm4v'
            });

            art.on('ready', () => {
                // Audio Boost 5x
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const src = ctx.createMediaElementSource(art.video);
                    const gain = ctx.createGain();
                    gain.gain.value = 5;
                    src.connect(gain).connect(ctx.destination);
                } catch(e) {}
                
                hideLoader();
            });

            // Error recovery: If a source fails, try next one
            art.on('video:error', () => {
                const idx = list.findIndex(s => s.url === art.url);
                if (idx < list.length - 1) art.switchUrl(list[idx + 1].url);
            });

            // Auto-hide loader after 10s if 'ready' never fires
            setTimeout(hideLoader, 10000);

            window.art = art;
        }

        start();
    </script>
</body>
</html>
