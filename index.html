<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/artplayer/dist/artplayer.css">
<style>
body { margin:0; background:black; color:white; font-family:sans-serif; }
#player { width:100vw; height:100vh; }
#sources {
  position:fixed; bottom:0; width:100%;
  max-height:40%; overflow:auto;
  background:#111; display:none;
}
.source { padding:12px; border-bottom:1px solid #333; }
</style>
</head>

<body>

<div id="player"></div>
<div id="sources"></div>

<script src="https://unpkg.com/artplayer/dist/artplayer.js"></script>

<script>

// ===== CONFIG =====
const BASE = "https://hdhub.thevolecitor.qzz.io/eyJ0b3Jib3giOiJ1bnNldCIsInF1YWxpdGllcyI6IjEwODBwLDcyMHAiLCJzb3J0IjoiZGVzYyJ9";

// ===== PARAMS =====
const q = new URLSearchParams(location.search);
const id = q.get("id");
const s = q.get("s");
const e = q.get("e");

const isSeries = s && e;

// ===== BUILD URL (FIXED OLD ENDPOINT) =====
function getUrl() {
  if (isSeries) {
    return `${BASE}/stream/series/${id}:${s}:${e}.json`;
  } else {
    return `${BASE}/stream/movie/${id}/1/1.json`;
  }
}

// ===== FETCH SAFE =====
async function fetchData(url) {
  try {
    const res = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(url));
    const text = await res.text();

    if (text.startsWith("<")) throw "Blocked HTML";

    return JSON.parse(text);

  } catch (err) {
    alert("Fetch Error:\n" + err);
    throw err;
  }
}

// ===== PIXELDRAIN FIX =====
function fixPixeldrain(url) {
  if (url.includes("pixeldrain.com/u/")) {
    const id = url.split("/u/")[1];
    return `https://pixeldrain.com/api/file/${id}?download`;
  }
  return url;
}

// ===== FILTER + SORT =====
function parseStreams(data) {
  let out = [];

  (data.streams || []).forEach(s => {

    let name = (s.name || "").toLowerCase();

    if (
      name.includes("fsl") ||
      name.includes("castle") ||
      name.includes("pixeldrain")
    ) {

      let url = s.url;

      // fix pixeldrain
      if (url.includes("pixeldrain")) {
        url = fixPixeldrain(url);
      }

      out.push({
        name: s.name,
        url: url
      });
    }
  });

  return out;
}

// ===== PLAYER =====
function createPlayer(url) {

  const art = new Artplayer({
    container: "#player",
    url: url,
    autoplay: true,
    fullscreen: true,
    autoOrientation: true,
    controls: [
      {
        position: "right",
        html: "Source",
        click: () => toggleSources()
      }
    ]
  });

  // 🔊 BOOST
  const ctx = new AudioContext();
  const src = ctx.createMediaElementSource(art.video);
  const gain = ctx.createGain();
  gain.gain.value = 4;
  src.connect(gain).connect(ctx.destination);

  window.art = art;
}

// ===== SOURCE UI =====
function showSources(list) {
  const box = document.getElementById("sources");
  box.innerHTML = "";

  list.forEach(s => {
    const div = document.createElement("div");
    div.className = "source";
    div.innerText = s.name;

    div.onclick = () => {
      art.switchUrl(s.url);
      box.style.display = "none";
    };

    box.appendChild(div);
  });
}

function toggleSources() {
  const box = document.getElementById("sources");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

// ===== INIT =====
(async () => {

  const data = await fetchData(getUrl());
  const streams = parseStreams(data);

  if (!streams.length) {
    alert("No working servers found");
    return;
  }

  createPlayer(streams[0].url);
  showSources(streams);

})();

</script>

</body>
</html>
