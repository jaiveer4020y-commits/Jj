<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Cloud Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body { margin:0; background:black; color:white; font-family:sans-serif; }

video {
  width:100%;
  height:100vh;
  object-fit:contain;
}

.overlay {
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  pointer-events:none;
}

.topbar, .bottombar {
  background:linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
  padding:10px;
  pointer-events:auto;
}

.bottombar {
  background:linear-gradient(to top, rgba(0,0,0,0.7), transparent);
  display:flex;
  justify-content:space-around;
}

.panel {
  position:fixed;
  top:0;
  width:70%;
  height:100%;
  background:#111;
  overflow:auto;
  transform:translateX(-100%);
  transition:0.3s;
}

.panel.right {
  right:0;
  left:auto;
  transform:translateX(100%);
}

.panel.active {
  transform:translateX(0);
}

.item {
  padding:12px;
  border-bottom:1px solid #333;
}

.seek {
  position:absolute;
  top:50%;
  font-size:30px;
  opacity:0;
  transition:0.2s;
}

.seek.show { opacity:1; }

.left { left:20px; }
.right { right:20px; }
</style>
</head>

<body>

<video id="video"></video>

<div class="overlay">
  <div class="topbar" id="title">Loading...</div>

  <div class="bottombar">
    <button onclick="openPanel('sources')">Source</button>
    <button onclick="openPanel('audio')">Tracks</button>
    <button onclick="openPanel('subs')">Subs</button>
  </div>
</div>

<div id="sources" class="panel"></div>
<div id="audio" class="panel right"></div>
<div id="subs" class="panel right"></div>

<div id="seekL" class="seek left">⏪ 10s</div>
<div id="seekR" class="seek right">10s ⏩</div>

<script>

// ===== CONFIG =====
const BASE = "https://hdhub.thevolecitor.qzz.io/eyJ0b3Jib3giOiJ1bnNldCIsInF1YWxpdGllcyI6IjEwODBwLDcyMHAiLCJzb3J0IjoiZGVzYyJ9";

const path = location.pathname.split("/").filter(Boolean);
const imdb = path[0] || "tt0944947";
const season = path[1];
const episode = path[2];

const isSeries = season && episode;

const api = isSeries
 ? `${BASE}/stream/series/${imdb}:${season}:${episode}.json`
 : `${BASE}/stream/movie/${imdb}.json`;

const video = document.getElementById("video");

let hls;

// ===== LOAD =====
async function load(){
  const res = await fetch(api);
  const txt = await res.text();

  if(txt.startsWith("<")){
    alert("Blocked / invalid JSON");
    return;
  }

  const data = JSON.parse(txt);

  const streams = data.streams.filter(s =>
    s.name.includes("Castle") ||
    s.name.includes("FSL") ||
    s.name.includes("Pixel")
  );

  renderSources(streams);
  play(streams[0].url);
}

// ===== PLAY =====
function play(src){
  if(hls) hls.destroy();

  hls = new Hls();
  hls.loadSource(src);
  hls.attachMedia(video);

  hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
    video.play();

    // BOOST
    const ctx = new AudioContext();
    const source = ctx.createMediaElementSource(video);
    const gain = ctx.createGain();
    gain.gain.value = 5;
    source.connect(gain).connect(ctx.destination);

    renderTracks();
  });
}

// ===== PANELS =====
function openPanel(id){
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ===== SOURCES =====
function renderSources(list){
  const box = document.getElementById("sources");
  box.innerHTML = "<h3>Sources</h3>";

  list.forEach(s=>{
    const div = document.createElement("div");
    div.className="item";
    div.innerText = s.name;
    div.onclick = ()=> play(s.url);
    box.appendChild(div);
  });
}

// ===== TRACKS =====
function renderTracks(){
  const a = document.getElementById("audio");
  const s = document.getElementById("subs");

  a.innerHTML = "<h3>Audio</h3>";
  s.innerHTML = "<h3>Subs</h3>";

  hls.audioTracks.forEach((t,i)=>{
    let d=document.createElement("div");
    d.className="item";
    d.innerText=t.name;
    d.onclick=()=>hls.audioTrack=i;
    a.appendChild(d);
  });

  hls.subtitleTracks.forEach((t,i)=>{
    let d=document.createElement("div");
    d.className="item";
    d.innerText=t.name;
    d.onclick=()=>hls.subtitleTrack=i;
    s.appendChild(d);
  });
}

// ===== DOUBLE TAP SEEK =====
let lastTap = 0;

video.addEventListener("click", (e)=>{
  const now = Date.now();
  if(now - lastTap < 300){
    if(e.clientX < window.innerWidth/2){
      video.currentTime -= 10;
      flash("seekL");
    } else {
      video.currentTime += 10;
      flash("seekR");
    }
  }
  lastTap = now;
});

function flash(id){
  const el = document.getElementById(id);
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),500);
}

// ===== INIT =====
load();

</script>

</body>
</html>
