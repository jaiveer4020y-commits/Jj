<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
}

video {
  width:100%;
  height:100vh;
  background:black;
}

.controls {
  position:absolute;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.btn {
  font-size:14px;
}

.panel {
  position:fixed;
  bottom:-100%;
  left:0;
  width:100%;
  height:50%;
  background:#111;
  overflow:auto;
  transition:0.3s;
  padding:15px;
}

.panel.active {
  bottom:0;
}

.item {
  padding:10px;
  border-bottom:1px solid #333;
}
</style>
</head>

<body>

<video id="video" controls></video>

<div class="controls">
  <div class="btn" onclick="openPanel('sources')">Source</div>
  <div class="btn" onclick="openPanel('audio')">Tracks</div>
  <div class="btn" onclick="openPanel('subs')">Subtitles</div>
</div>

<div id="sources" class="panel"></div>
<div id="audio" class="panel"></div>
<div id="subs" class="panel"></div>

<script>

// ===== CONFIG =====
const BASE = "https://hdhub.thevolecitor.qzz.io/eyJ0b3Jib3giOiJ1bnNldCIsInF1YWxpdGllcyI6IjEwODBwLDcyMHAiLCJzb3J0IjoiZGVzYyJ9";

// ===== DETECT =====
const path = location.pathname.split("/").filter(Boolean);

const imdb = path[0] || "tt0944947";
const season = path[1];
const episode = path[2];

const isSeries = season && episode;

const url = isSeries
 ? `${BASE}/stream/series/${imdb}:${season}:${episode}.json`
 : `${BASE}/stream/movie/${imdb}.json`;

const video = document.getElementById("video");

let hls;

// ===== FETCH =====
async function load() {

  const res = await fetch(url);
  const text = await res.text();

  if(text.startsWith("<")) {
    alert("Provider blocked / invalid response");
    return;
  }

  const data = JSON.parse(text);

  const streams = data.streams.filter(s =>
    s.name.includes("Castle") ||
    s.name.includes("FSL") ||
    s.name.includes("Pixel")
  );

  renderSources(streams);
  play(streams[0].url);
}

// ===== PLAY =====
function play(src){

  if(hls) hls.destroy();

  if(Hls.isSupported()){
    hls = new Hls();
    hls.loadSource(src);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{

      // AUDIO BOOST
      const ctx = new AudioContext();
      const source = ctx.createMediaElementSource(video);
      const gain = ctx.createGain();
      gain.gain.value = 5.0;
      source.connect(gain).connect(ctx.destination);

      renderTracks(hls);
    });

  } else {
    video.src = src;
  }
}

// ===== SOURCES =====
function renderSources(list){
  const box = document.getElementById("sources");
  box.innerHTML = "<h3>Sources</h3>";

  list.forEach(s=>{
    const div = document.createElement("div");
    div.className="item";
    div.innerText = s.name;

    div.onclick = ()=>{
      play(s.url);
      closePanels();
    };

    box.appendChild(div);
  });
}

// ===== AUDIO TRACKS =====
function renderTracks(hls){

  const audioBox = document.getElementById("audio");
  audioBox.innerHTML = "<h3>Audio Tracks</h3>";

  hls.audioTracks.forEach((t,i)=>{
    const div = document.createElement("div");
    div.className="item";
    div.innerText = t.name;

    div.onclick = ()=>{
      hls.audioTrack = i;
    };

    audioBox.appendChild(div);
  });

  const subBox = document.getElementById("subs");
  subBox.innerHTML = "<h3>Subtitles</h3>";

  hls.subtitleTracks.forEach((t,i)=>{
    const div = document.createElement("div");
    div.className="item";
    div.innerText = t.name;

    div.onclick = ()=>{
      hls.subtitleTrack = i;
    };

    subBox.appendChild(div);
  });
}

// ===== PANELS =====
function openPanel(id){
  closePanels();
  document.getElementById(id).classList.add("active");
}

function closePanels(){
  document.querySelectorAll(".panel").forEach(p=>{
    p.classList.remove("active");
  });
}

// ===== INIT =====
load();

</script>

</body>
</html>
