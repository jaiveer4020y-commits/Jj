    <script>
        const video = document.getElementById('video');
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id') || 'movie';
        const s = params.get('s');
        const e = params.get('e');
        
        let hls = new Hls();

        // --- NEW STREAMING LOGIC ---

        async function fetchPrimaryStream() {
            // Build the slug as per instructions
            let slug = id;
            if (s && e) {
                // series.name.s01e01
                const season = s.padStart(2, '0');
                const episode = e.padStart(2, '0');
                slug = `${id}.s${season}e${episode}`;
            } else {
                // movie.name.year
                slug = id; 
            }

            const apiEndpoint = `https://u-1-1azw.onrender.com/api/get-stream?title=${slug}`;
            const proxyPrefix = "https://workingg.vercel.app/api/proxy?url=";

            console.log("Attempting Primary Stream for:", slug);

            for (let i = 1; i <= 5; i++) {
                try {
                    const response = await fetch(apiEndpoint);
                    if (!response.ok) throw new Error("API Response Error");
                    
                    const data = await response.json();
                    // Retrieve m3u8 URL from JSON (Assuming 'url' or 'm3u8' field)
                    const rawM3u8 = data.url || data.m3u8 || data.stream;

                    if (rawM3u8) {
                        const finalUrl = proxyPrefix + encodeURIComponent(rawM3u8);
                        console.log("Primary Stream Success:", finalUrl);
                        return finalUrl;
                    }
                } catch (err) {
                    console.warn(`Primary Attempt ${i} failed. Retrying...`);
                }
            }
            return null; // Fallback to Secondary
        }

        async function initializePlayer() {
            // 1. Try Primary Method (Onrender API)
            let streamUrl = await fetchPrimaryStream();

            // 2. Fallback to Secondary Method (GitHub/Original)
            if (!streamUrl) {
                console.log("Primary failed after 5 tries. Falling back to Secondary.");
                // Constructing your original github/secondary logic here
                streamUrl = `https://raw.githubusercontent.com/username/repo/main/streams/${id}.m3u8`; 
                // Note: Replace with your actual secondary logic if different
            }

            if (Hls.isSupported()) {
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                });

                // Handle Proxying for Audio Tracks and Variants
                hls.on(Hls.Events.LEVEL_LOADING, (event, data) => {
                    // This ensures sub-requests are also proxied if the manifest links are relative
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
            }
        }

        // Basic Controls Implementation
        document.getElementById('play-pause-button').onclick = () => {
            if (video.paused) video.play();
            else video.pause();
        };

        video.ontimeupdate = () => {
            const progress = (video.currentTime / video.duration) * 100;
            document.getElementById('progress-indicator').style.width = progress + '%';
            document.getElementById('seek-thumb').style.left = progress + '%';
        };

        document.getElementById('fullscreen-button').onclick = () => {
            if (video.requestFullscreen) video.requestFullscreen();
        };

        // Start initialization
        initializePlayer();

    </script>
