<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloud Player Pro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/artplayer/dist/artplayer.css">
    
    <style>
        :root { --flix-red: #e50914; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }

        /* Force Landscape on Mobile */
        @media screen and (orientation: portrait) {
            #artplayer {
                transform: rotate(90deg);
                transform-origin: bottom left;
                width: 100vh;
                height: 100vw;
                position: absolute;
                top: -100vw;
                left: 0;
            }
        }

        /* Flixer Theme Overrides */
        .art-video-player .art-progress-played { background: var(--flix-red) !important; }
        .art-video-player .art-progress-indicator { background: var(--flix-red) !important; }
        .art-video-player .art-setting-item.art-setting-item-active { color: var(--flix-red) !important; }
        
        /* Simple Loader */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spin { width: 40px; height: 40px; border: 3px solid #222; border-top-color: var(--flix-red); border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }

        #artplayer { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="loader"><div class="spin"></div><p style="color:white; margin-top:15px; font-family:sans-serif; font-size:12px; letter-spacing:2px;">LOADING STREAM...</p></div>
    <div id="artplayer"></div>

    <script src="https://unpkg.com/artplayer/dist/artplayer.js"></script>

    <script>
        const API_BASE = "https://hdhub.thevolecitor.qzz.io/eyJ0b3Jib3giOiJ1bnNldCIsInF1YWxpdGllcyI6IjEwODBwLDcyMHAiLCJzb3J0IjoiZGVzYyJ9/stream";
        
        // URL Data Fetching
        const path = window.location.pathname;
        const params = new URLSearchParams(window.location.search);
        const id = (path.match(/tt\d+/) || [params.get("id")])[0];
        const nums = path.split('/').filter(x => x && !x.includes('tt') && !isNaN(x));
        const s = nums[0] || params.get("s");
        const e = nums[1] || params.get("e");

        async function start() {
            if (!id) return;
            const target = (s && e) ? `${API_BASE}/series/${id}:${s}:${e}.json` : `${API_BASE}/movie/${id}.json`;

            try {
                // Multi-proxy approach to prevent playback errors
                const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(target)}`);
                const data = await res.json();
                
                const streams = (data.streams || []).map(st => {
                    let u = st.url;
                    if (st.name.toLowerCase().includes("pixeldrain")) {
                        u = `https://pixeldrain.com/api/file/${u.split("/u/")[1] || u.split("/").pop()}?download`;
                    }
                    return { name: st.name, url: u };
                });

                if (streams.length > 0) initPlayer(streams);
                else throw "No Streams Found";

            } catch (err) {
                console.error(err);
                document.getElementById('loader').innerHTML = '<p style="color:red">STREAM FAILED. PLEASE REFRESH.</p>';
            }
        }

        function initPlayer(list) {
            const art = new Artplayer({
                container: '#artplayer',
                url: list[0].url,
                autoplay: true,
                fullscreen: true,
                setting: true,
                playbackRate: true,
                aspectRatio: true,
                pip: true,
                autoOrientation: true,
                // --- FIX FOR DOWNLOAD LINKS ---
                type: 'm4v',
                customType: {
                    m4v: function(video, url) {
                        video.src = url;
                        video.crossOrigin = "anonymous";
                    }
                },
                settings: [
                    {
                        width: 200,
                        html: 'SERVERS',
                        selector: list.map(item => ({
                            html: item.name,
                            url: item.url,
                        })),
                        onSelect: function(item) {
                            art.switchUrl(item.url);
                            return item.html;
                        }
                    }
                ],
                controls: [
                    {
                        position: 'right',
                        html: 'EPISODES',
                        click: function () {
                            art.setting.show = true; // Opens the server/episode list
                        },
                    },
                ],
            });

            // Hide loader as soon as the video is actually ready to play
            art.on('video:canplay', () => {
                document.getElementById('loader').style.display = 'none';
                
                // Audio Boost 5x
                const actx = new (window.AudioContext || window.webkitAudioContext)();
                const src = actx.createMediaElementSource(art.video);
                const gain = actx.createGain();
                gain.gain.value = 5;
                src.connect(gain).connect(actx.destination);
            });

            // Auto-recovery if a link dies
            art.on('video:error', () => {
                const currentIdx = list.findIndex(s => s.url === art.url);
                if (currentIdx < list.length - 1) {
                    art.switchUrl(list[currentIdx + 1].url);
                }
            });

            window.art = art;
        }

        start();
    </script>
</body>
</html>
