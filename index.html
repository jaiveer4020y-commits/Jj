<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloud Player Pro - Flixer Edition</title>
    
    <link rel="stylesheet" href="https://unpkg.com/artplayer/dist/artplayer.css">
    
    <style>
        :root {
            --red: #ff0000;
            --bg: #000000;
            --glass: rgba(0, 0, 0, 0.7);
            --sidebar-w: 80px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }

        /* --- LANDSCAPE ENFORCEMENT --- */
        #rotate-notice {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .phone { width: 50px; height: 90px; border: 3px solid #fff; border-radius: 8px; animation: rotate 2s infinite; }
        @keyframes rotate { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } }
        @media screen and (orientation: portrait) { #rotate-notice { display: flex; } }

        /* --- PLAYER CORE --- */
        #player-wrapper { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #artplayer { width: 100%; height: 100%; }

        /* --- CUSTOM FLIXER UI OVERLAY --- */
        #custom-ui {
            position: absolute; inset: 0; z-index: 100;
            display: flex; flex-direction: column;
            background: linear-gradient(to right, rgba(0,0,0,0.8) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.8) 100%);
            transition: opacity 0.3s;
            opacity: 1;
        }
        .ui-hidden { opacity: 0 !important; pointer-events: none; }

        /* Left Sidebar (Icons + Labels) */
        #sidebar {
            position: absolute; left: 0; top: 0; bottom: 0;
            width: var(--sidebar-w); display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 30px;
            padding-left: 10px;
        }
        .side-btn { 
            display: flex; flex-direction: column; align-items: center; 
            cursor: pointer; opacity: 0.8; transition: 0.2s;
        }
        .side-btn:hover { opacity: 1; transform: scale(1.1); }
        .side-btn svg { width: 28px; height: 28px; margin-bottom: 5px; fill: white; }
        .side-btn span { font-size: 10px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }

        /* Top Right Info */
        #title-info {
            position: absolute; top: 30px; right: 40px;
            text-align: right; font-weight: bold; letter-spacing: 1px;
            text-shadow: 2px 2px 4px #000;
        }

        /* Center Controls */
        #center-controls {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex; align-items: center; gap: 60px;
        }
        .skip-btn { cursor: pointer; opacity: 0.9; width: 45px; height: 45px; }
        #play-pause { width: 80px; height: 80px; cursor: pointer; }

        /* Bottom Control Bar */
        #bottom-bar {
            position: absolute; bottom: 30px; left: var(--sidebar-w); right: 40px;
            display: flex; align-items: center; gap: 20px;
        }
        #progress-container { flex: 1; position: relative; height: 30px; display: flex; align-items: center; cursor: pointer; }
        #progress-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.2); position: relative; }
        #progress-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--red); width: 0%; }
        #progress-dot { 
            position: absolute; top: 50%; transform: translate(-50%, -50%); 
            width: 12px; height: 12px; background: var(--red); border-radius: 50%; 
        }
        .time-display { font-size: 14px; font-family: monospace; }
        .bottom-icons { display: flex; align-items: center; gap: 20px; }
        .bottom-icons svg { width: 24px; height: 24px; fill: white; cursor: pointer; }

        /* Server List Modal */
        #server-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 1000; display: none; align-items: center; justify-content: center;
        }
        .modal-content { width: 80%; max-width: 400px; }
        .server-item { 
            padding: 15px; border: 1px solid #333; margin-bottom: 10px; 
            text-align: center; border-radius: 8px; cursor: pointer; 
        }
        .server-item:hover { background: var(--red); border-color: var(--red); }

        /* Videasy Loader */
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #poster { width: 160px; height: 240px; border-radius: 10px; margin-bottom: 20px; animation: pulse 2s infinite; object-fit: cover; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="rotate-notice"><div class="phone"></div><h2 style="margin-top:20px">ROTATE TO VIEW</h2></div>

    <div id="loader"><img id="poster" src=""><div id="status">INITIATING...</div></div>

    <div id="server-modal">
        <div class="modal-content">
            <h3 style="text-align:center">SELECT SERVER</h3>
            <div id="server-list"></div>
            <button onclick="document.getElementById('server-modal').style.display='none'" style="width:100%; padding:10px; background:none; border:1px solid #555; color:white; margin-top:10px;">CLOSE</button>
        </div>
    </div>

    <div id="player-wrapper">
        <div id="artplayer"></div>
        
        <div id="custom-ui">
            <div id="sidebar">
                <div class="side-btn">
                    <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
                    <span>Episodes</span>
                </div>
                <div class="side-btn">
                    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
                    <span>Subtitles</span>
                </div>
                <div class="side-btn" onclick="document.getElementById('server-modal').style.display='flex'">
                    <svg viewBox="0 0 24 24"><path d="M20 13H4c-.55 0-1 .45-1 1v6c0 .55.45 1 1 1h16c.55 0 1-.45 1-1v-6c0-.55-.45-1-1-1zM7 19c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM20 3H4c-.55 0-1 .45-1 1v6c0 .55.45 1 1 1h16c.55 0 1-.45 1-1V4c0-.55-.45-1-1-1zM7 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
                    <span>Servers</span>
                </div>
                <div class="side-btn">
                    <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.21.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                    <span>Settings</span>
                </div>
            </div>

            <div id="title-info">S1:E1 "LOADING..."</div>

            <div id="center-controls">
                <div class="skip-btn" onclick="skip(-10)">
                    <svg viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
                </div>
                <div id="play-pause" onclick="togglePlay()">
                    <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" style="display:none" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </div>
                <div class="skip-btn" onclick="skip(10)">
                    <svg viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
                </div>
            </div>

            <div id="bottom-bar">
                <div class="time-display" id="curr-time">00:00</div>
                <div id="progress-container" onclick="seek(event)">
                    <div id="progress-bg">
                        <div id="progress-fill"></div>
                        <div id="progress-dot"></div>
                    </div>
                </div>
                <div class="time-display" id="total-time">00:00</div>
                <div class="bottom-icons">
                    <svg viewBox="0 0 24 24" onclick="toggleFull()"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    <svg viewBox="0 0 24 24" onclick="location.href='about:blank'"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/artplayer/dist/artplayer.js"></script>

    <script>
        const TMDB_KEY = "81f645c3d9ced06a366b0d829d844cfe";
        const API_BASE = "https://hdhub.thevolecitor.qzz.io/eyJ0b3Jib3giOiJ1bnNldCIsInF1YWxpdGllcyI6IjEwODBwLDcyMHAiLCJzb3J0IjoiZGVzYyJ9/stream";

        const path = window.location.pathname;
        const search = new URLSearchParams(window.location.search);
        const id = (path.match(/tt\d+/) || [search.get("id")])[0];
        const segments = path.split('/').filter(s => s && !s.includes('tt') && !isNaN(s));
        const s = segments[0] || search.get("s");
        const e = segments[1] || search.get("e");
        const isSeries = !!(s && e);

        let art;

        async function init() {
            if (!id) return;

            // Poster & Title
            fetch(`https://api.themoviedb.org/3/find/${id}?api_key=${TMDB_KEY}&external_source=imdb_id`)
                .then(r => r.json()).then(data => {
                    const item = data.movie_results[0] || data.tv_results[0];
                    if (item) {
                        document.getElementById("poster").src = `https://image.tmdb.org/t/p/w500${item.poster_path}`;
                        const t = isSeries ? `S${s}:E${e} "${item.name}"` : item.title;
                        document.getElementById("title-info").innerText = t;
                    }
                });

            // Fetch Streams
            const target = isSeries ? `${API_BASE}/series/${id}:${s}:${e}.json` : `${API_BASE}/movie/${id}.json`;
            try {
                const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(target)}`);
                const data = await res.json();
                
                const streams = (data.streams || []).map(st => {
                    let u = st.url;
                    if (st.name.toLowerCase().includes("pixeldrain")) {
                        u = `https://pixeldrain.com/api/file/${u.split("/u/")[1]}?download`;
                    }
                    return { name: st.name, url: u };
                });

                buildServerList(streams);
                setupArtPlayer(streams[0].url);
            } catch (err) { alert("Failed to load servers."); }
        }

        function setupArtPlayer(videoUrl) {
            art = new Artplayer({
                container: '#artplayer',
                url: videoUrl,
                autoplay: true,
                fullscreen: true,
                controls: false, // DISABLE DEFAULT UI
                setting: false,
                type: 'm4v',
                customType: { m4v: (video, url) => video.src = url }
            });

            art.on('ready', () => {
                document.getElementById("loader").style.display = "none";
                // Audio Boost 5x
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const src = ctx.createMediaElementSource(art.video);
                const gain = ctx.createGain(); gain.gain.value = 5;
                src.connect(gain).connect(ctx.destination);
            });

            // UI Listeners
            art.on('video:timeupdate', () => {
                const percent = (art.currentTime / art.duration) * 100;
                document.getElementById("progress-fill").style.width = percent + "%";
                document.getElementById("progress-dot").style.left = percent + "%";
                document.getElementById("curr-time").innerText = formatTime(art.currentTime);
                document.getElementById("total-time").innerText = formatTime(art.duration);
            });

            art.on('video:play', () => {
                document.getElementById("play-icon").style.display = "none";
                document.getElementById("pause-icon").style.display = "block";
            });

            art.on('video:pause', () => {
                document.getElementById("play-icon").style.display = "block";
                document.getElementById("pause-icon").style.display = "none";
            });
        }

        // --- CUSTOM UI LOGIC ---
        function togglePlay() { art.playing ? art.pause() : art.play(); }
        function skip(val) { art.currentTime += val; }
        function toggleFull() { art.fullscreen = !art.fullscreen; }
        function seek(e) {
            const rect = document.getElementById("progress-container").getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            art.currentTime = pos * art.duration;
        }
        function formatTime(s) {
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = Math.floor(s % 60);
            return (h > 0 ? h + ":" : "") + (m < 10 ? "0" + m : m) + ":" + (sec < 10 ? "0" + sec : sec);
        }

        function buildServerList(list) {
            const container = document.getElementById("server-list");
            list.forEach(s => {
                const el = document.createElement("div");
                el.className = "server-item";
                el.innerText = s.name;
                el.onclick = () => {
                    art.switchUrl(s.url);
                    document.getElementById("server-modal").style.display = "none";
                };
                container.appendChild(el);
            });
        }

        // Auto-Hide UI
        let timer;
        const ui = document.getElementById("custom-ui");
        document.body.addEventListener('mousemove', () => {
            ui.classList.remove('ui-hidden');
            clearTimeout(timer);
            timer = setTimeout(() => ui.classList.add('ui-hidden'), 3000);
        });
        document.body.addEventListener('touchstart', () => {
            ui.classList.remove('ui-hidden');
            clearTimeout(timer);
            timer = setTimeout(() => ui.classList.add('ui-hidden'), 3000);
        });

        init();
    </script>
</body>
</html>
